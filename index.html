      <div style="font-size:14px;margin-bottom:8px;">${label}</div>
      <div style="display:flex;gap:6px;">
        ${[1, 2, 3, 4, 5].map(n => `<button data-scale="${id}" data-value="${n}" style="flex:1;padding:10px 0;border-radius:10px;border:1px solid var(--border);background:${d[id] == n ? "var(--accent)" : "transparent"};color:${d[id] == n ? "var(--accentText)" : "var(--textDim)"};font-weight:700;">${n}</button>`).join("")}
      </div>
    </div>`;

  const yesNo = (id, label) => `
    <div style="margin-bottom:16px;">
      <div style="font-size:14px;margin-bottom:8px;">${label}</div>
      <div style="display:flex;gap:8px;">
        <button data-bool="${id}" data-value="true" style="flex:1;padding:10px 0;border-radius:10px;border:1px solid var(--border);background:${d[id] === true ? "var(--accent)" : "transparent"};color:${d[id] === true ? "var(--accentText)" : "var(--textDim)"};font-weight:700;">Oui</button>
        <button data-bool="${id}" data-value="false" style="flex:1;padding:10px 0;border-radius:10px;border:1px solid var(--border);background:${d[id] === false ? "var(--accent)" : "transparent"};color:${d[id] === false ? "var(--accentText)" : "var(--textDim)"};font-weight:700;">Non</button>
      </div>
    </div>`;

  html += `<div class="ex-card"><div class="ex-body" style="padding-top:16px;">`;
  html += scaleRow("feeling", "Ressenti global de la semaine (1 = épuisé, 5 = en pleine forme)");
  html += yesNo("water_3l", "As-tu bu 3L d'eau par jour ?");
  html += yesNo("pain_other", "Des douleurs autres que des courbatures ?");
  if (d.pain_other === true) {
    html += `<textarea id="painDetail" placeholder="Détaille où et depuis quand…" rows="2" style="margin-bottom:16px;">${esc(d.pain_detail || "")}</textarea>`;
  }
  html += scaleRow("sleep_quality", "Qualité de ton sommeil (1 = mauvais, 5 = excellent)");
  html += scaleRow("stress_level", "Niveau de stress de la semaine (1 = faible, 5 = élevé)");
  html += `<div style="margin-bottom:16px;">
    <div style="font-size:14px;margin-bottom:8px;">As-tu respecté ton plan nutritionnel ?</div>
    <select id="nutritionRespect">
      <option value="">—</option>
      <option value="oui" ${d.nutrition_respect === "oui" ? "selected" : ""}>Oui</option>
      <option value="partiel" ${d.nutrition_respect === "partiel" ? "selected" : ""}>En partie</option>
      <option value="non" ${d.nutrition_respect === "non" ? "selected" : ""}>Non</option>
    </select>
  </div>`;
  html += scaleRow("motivation", "Motivation à poursuivre le programme (1 = faible, 5 = au top)");
  html += yesNo("missed_sessions", "As-tu manqué des séances cette semaine ?");
  if (d.missed_sessions === true) {
    html += `<textarea id="missedReason" placeholder="Pourquoi ?" rows="2" style="margin-bottom:6px;">${esc(d.missed_reason || "")}</textarea>`;
  }
  html += `</div></div>`;

  html += `<div class="ex-card"><div class="ex-body" style="padding-top:16px;">
    <div style="font-weight:700;margin-bottom:12px;">📏 Mensurations</div>
    <div style="font-size:13px;color:var(--textDim);margin-bottom:6px;">Poids actuel (à jeun)</div>
    <input id="bodyweight" inputmode="decimal" placeholder="kg" value="${d.bodyweight ?? ""}" style="margin-bottom:12px;" />
    <div class="row"><input id="armLeft" inputmode="decimal" placeholder="Bras gauche contracté (cm)" value="${d.arm_left ?? ""}" /><input id="armRight" inputmode="decimal" placeholder="Bras droit contracté (cm)" value="${d.arm_right ?? ""}" /></div>
    <div class="row"><input id="legLeft" inputmode="decimal" placeholder="Jambe gauche contractée (cm)" value="${d.leg_left ?? ""}" /><input id="legRight" inputmode="decimal" placeholder="Jambe droite contractée (cm)" value="${d.leg_right ?? ""}" /></div>
    <div class="row"><input id="shoulders" inputmode="decimal" placeholder="Tour d'épaules (cm)" value="${d.shoulders ?? ""}" /><input id="waist" inputmode="decimal" placeholder="Tour de taille (cm)" value="${d.waist ?? ""}" /></div>
  </div></div>`;

  html += `<div class="ex-card"><div class="ex-body" style="padding-top:16px;">
    <div style="font-weight:700;margin-bottom:12px;">📸 Photos & pas</div>
    ${photoField("photoFront", "Photo de face", state.checkinExisting?.photo_front_url)}
    ${photoField("photoBack", "Photo de dos", state.checkinExisting?.photo_back_url)}
    ${photoField("photoSide", "Photo de profil", state.checkinExisting?.photo_side_url)}
    ${photoField("stepsScreenshot", "Capture d'écran de tes pas de la semaine", state.checkinExisting?.steps_screenshot_url)}
  </div></div>`;

  html += `<button class="validate-btn" id="submitCheckinBtn">✓ Envoyer mon bilan</button>`;
  return html;
}

function renderCheckinHistorique() {
  if (state.checkinsHistory === null) {
    return `<div class="empty-state">Chargement…</div>`;
  }
  const past = [...state.checkinsHistory].sort((a, b) => b.created_at.localeCompare(a.created_at));
  if (past.length === 0) {
    return `<div class="empty-state">📋<div>Aucun bilan envoyé pour l'instant.</div></div>`;
  }
  return past.map(ck => `
    <div class="ex-card"><div class="ex-body" style="padding-top:16px;">
      <div style="font-weight:700;margin-bottom:8px;">Semaine ${esc(ck.week_key)} · ${formatDateFR(ck.created_at.slice(0, 10))}</div>
      <div style="font-size:13.5px;color:var(--textDim);line-height:1.8;">
        Ressenti : <strong style="color:var(--text);">${ck.feeling ?? "—"}/5</strong> · Sommeil : <strong style="color:var(--text);">${ck.sleep_quality ?? "—"}/5</strong> · Stress : <strong style="color:var(--text);">${ck.stress_level ?? "—"}/5</strong> · Motivation : <strong style="color:var(--text);">${ck.motivation ?? "—"}/5</strong><br/>
        Eau 3L/jour : <strong style="color:var(--text);">${ck.water_3l === true ? "Oui" : ck.water_3l === false ? "Non" : "—"}</strong> · Douleurs : <strong style="color:var(--text);">${ck.pain_other === true ? "Oui" : ck.pain_other === false ? "Non" : "—"}</strong><br/>
        Poids : <strong style="color:var(--text);">${ck.bodyweight ?? "—"}kg</strong> · Bras G/D : <strong style="color:var(--text);">${ck.arm_left ?? "—"}/${ck.arm_right ?? "—"}cm</strong> · Jambe G/D : <strong style="color:var(--text);">${ck.leg_left ?? "—"}/${ck.leg_right ?? "—"}cm</strong><br/>
        Épaules : <strong style="color:var(--text);">${ck.shoulders ?? "—"}cm</strong> · Taille : <strong style="color:var(--text);">${ck.waist ?? "—"}cm</strong>
      </div>
      <div style="display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;">
        ${ck.photo_front_url ? `<a href="${esc(ck.photo_front_url)}" target="_blank" style="color:var(--accent);font-size:13px;">Photo face</a>` : ""}
        ${ck.photo_back_url ? `<a href="${esc(ck.photo_back_url)}" target="_blank" style="color:var(--accent);font-size:13px;">Photo dos</a>` : ""}
        ${ck.photo_side_url ? `<a href="${esc(ck.photo_side_url)}" target="_blank" style="color:var(--accent);font-size:13px;">Photo profil</a>` : ""}
        ${ck.steps_screenshot_url ? `<a href="${esc(ck.steps_screenshot_url)}" target="_blank" style="color:var(--accent);font-size:13px;">Capture pas</a>` : ""}
      </div>
    </div></div>`).join("");
}

function renderCheckin() {
  let html = `
    <div style="margin:20px 0 4px;">
      <button class="back-btn" data-back-to-profil="1">← Retour</button>
    </div>
    <div class="h1" style="font-size:26px;margin-top:10px;">BILAN</div>
    <div class="day-tabs">
      <button class="day-tab ${state.checkinView !== "historique" ? "active" : ""}" data-checkin-view="current">Cette semaine</button>
      <button class="day-tab ${state.checkinView === "historique" ? "active" : ""}" data-checkin-view="historique">Historique</button>
    </div>
  `;
  if (state.checkinView === "historique") {
    if (state.checkinsHistory === null) loadCheckinsHistory();
    html += renderCheckinHistorique();
  } else {
    html += renderCheckinCurrent();
  }
  return html;
}


function attachHandlers() {
  const app = document.getElementById("app");

  app.querySelectorAll("[data-open-day]").forEach(b => b.onclick = () => {
    state.openDayId = b.dataset.openDay;
    state.sessionInputs = {};
    state.openEx = {};
    render();
  });

  const back = app.querySelector("[data-back]");
  if (back) back.onclick = () => { state.openDayId = null; render(); };

  app.querySelectorAll("[data-toggle-ex]").forEach(b => b.onclick = () => {
    const id = b.dataset.toggleEx;
    state.openEx[id] = state.openEx[id] === false ? true : false;
    render();
  });

  app.querySelectorAll("[data-set-field]").forEach(inp => {
    inp.oninput = () => {
      const exId = inp.dataset.exId, idx = parseInt(inp.dataset.idx, 10), field = inp.dataset.setField;
      const day = state.program.find(d => d.id === state.openDayId);
      const exo = day.exercises.find(e => e.id === exId);
      const rows = parseTargetSets(exo.sets);
      if (!state.sessionInputs[exId]) state.sessionInputs[exId] = rows.map(r => ({ reps: r, kg: "" }));
      state.sessionInputs[exId][idx][field] = inp.value;
      updateCountersOnly();
    };
  });

  app.querySelectorAll("[data-note-ex]").forEach(inp => {
    inp.onblur = async () => {
      const exId = inp.dataset.noteEx;
      state.notes[exId] = inp.value;
      await sb.from("exercise_notes").upsert({ client_id: state.client.id, exercise_id: exId, note: inp.value });
    };
  });

  const validateBtn = app.querySelector("[data-validate]");
  if (validateBtn) validateBtn.onclick = async () => {
    const dayId = validateBtn.dataset.validate;
    const day = state.program.find(d => d.id === dayId);
    const dateStr = todayISO();
    const entries = {};
    day.exercises.forEach(e => {
      const rows = state.sessionInputs[e.id] || [];
      const filled = rows.filter(r => r.kg !== "" && r.kg !== undefined && r.kg !== null)
        .map(r => ({ reps: r.reps, kg: r.kg }));
      if (filled.length) entries[e.id] = filled;
    });
    validateBtn.textContent = "Enregistrement…";
    validateBtn.disabled = true;
    const { data, error } = await sb.from("session_logs").insert({
      client_id: state.client.id, day_id: dayId, log_date: dateStr, entries,
    }).select().single();
    if (error) { showToast("Erreur, réessaie."); validateBtn.disabled = false; return; }
    state.sessionLogs.push({ id: data.id, dayId, date: dateStr, entries });
    state.openDayId = null;
    state.sessionInputs = {};
    state.recapLogId = data.id;
    state.recapRpe = null;
    state.recapComment = "";
    render();
  };

  const closeRecapBtn = app.querySelector("[data-close-recap]");
  if (closeRecapBtn) closeRecapBtn.onclick = () => {
    state.recapLogId = null;
    state.tab = "seance";
    render();
  };

  app.querySelectorAll("[data-recap-rpe]").forEach(b => b.onclick = () => {
    state.recapRpe = parseInt(b.dataset.recapRpe, 10);
    render();
  });

  const saveRpeBtn = app.querySelector("[data-save-rpe]");
  if (saveRpeBtn) saveRpeBtn.onclick = async () => {
    const logId = saveRpeBtn.dataset.saveRpe;
    const comment = document.getElementById("recapComment").value;
    state.recapComment = comment;
    saveRpeBtn.textContent = "Enregistrement…";
    saveRpeBtn.disabled = true;
    const { error } = await sb.from("session_logs").update({ rpe: state.recapRpe, session_comment: comment || null }).eq("id", logId);
    if (error) { showToast("Erreur : " + error.message); saveRpeBtn.disabled = false; saveRpeBtn.textContent = "✓ Enregistrer mon ressenti"; return; }
    const localLog = state.sessionLogs.find(l => l.id === logId);
    if (localLog) { localLog.rpe = state.recapRpe; localLog.session_comment = comment || null; }
    showToast("Ressenti enregistré, merci !");
    saveRpeBtn.textContent = "✓ Enregistré";
  };

  app.querySelectorAll("[data-open-log]").forEach(b => b.onclick = () => {
    state.historyOpenLogId = b.dataset.openLog;
    state.historyDraft = null;
    render();
  });

  const backHistory = app.querySelector("[data-back-history]");
  if (backHistory) backHistory.onclick = () => {
    state.historyOpenLogId = null;
    state.historyDraft = null;
    render();
  };

  app.querySelectorAll("[data-hist-field]").forEach(inp => {
    inp.oninput = () => {
      const exId = inp.dataset.exId, idx = parseInt(inp.dataset.idx, 10), field = inp.dataset.histField;
      if (state.historyDraft && state.historyDraft[exId] && state.historyDraft[exId][idx]) {
        state.historyDraft[exId][idx][field] = inp.value;
      }
    };
  });

  const cancelHistBtn = app.querySelector("[data-cancel-history]");
  if (cancelHistBtn) cancelHistBtn.onclick = () => {
    state.historyOpenLogId = null;
    state.historyDraft = null;
    showToast("Modifications annulées.");
    render();
  };

  const saveHistBtn = app.querySelector("[data-save-history]");
  if (saveHistBtn) saveHistBtn.onclick = async () => {
    const logId = saveHistBtn.dataset.saveHistory;
    const log = state.sessionLogs.find(l => l.id === logId);
    if (log && state.historyDraft) {
      log.entries = state.historyDraft;
      const { error } = await sb.from("session_logs").update({ entries: log.entries }).eq("id", logId);
      if (error) { showToast("Erreur lors de l'enregistrement."); return; }
      showToast("Séance mise à jour.");
    }
    state.historyOpenLogId = null;
    state.historyDraft = null;
    render();
  };

  const deleteLogBtn = app.querySelector("[data-delete-log]");
  if (deleteLogBtn) deleteLogBtn.onclick = async () => {
    const logId = deleteLogBtn.dataset.deleteLog;
    if (!confirm("Supprimer définitivement cette séance de l'historique ? Elle ne comptera plus comme faite cette semaine-là.")) return;
    const { error } = await sb.from("session_logs").delete().eq("id", logId);
    if (error) { showToast("Erreur lors de la suppression."); return; }
    state.sessionLogs = state.sessionLogs.filter(l => l.id !== logId);
    showToast("Séance supprimée de l'historique.");
    state.historyOpenLogId = null;
    state.historyDraft = null;
    render();
  };

  app.querySelectorAll("[data-suivi-view]").forEach(b => b.onclick = () => {
    state.suiviView = b.dataset.suiviView;
    render();
  });

  app.querySelectorAll("[data-progress-day]").forEach(b => b.onclick = () => {
    state.progressDayId = b.dataset.progressDay;
    state.progressExId = null;
    render();
  });
  const progressSel = app.querySelector("[data-progress-ex]");
  if (progressSel) progressSel.onchange = () => { state.progressExId = progressSel.value; render(); };

  const logoutBtn = app.querySelector("[data-logout]");
  if (logoutBtn) logoutBtn.onclick = () => {
    if (!confirm("Te déconnecter de ce compte sur cet appareil ?")) return;
    localStorage.removeItem(ACCESS_KEY);
    state.screen = "access";
    state.client = null;
    render();
  };

  app.querySelectorAll("[data-goto-tab]").forEach(b => b.onclick = () => {
    state.tab = b.dataset.gotoTab;
    state.documentsOpenCategory = null;
    render();
  });

  document.querySelectorAll("[data-open-doc-category]").forEach(b => b.onclick = () => {
    state.documentsOpenCategory = b.dataset.openDocCategory;
    render();
  });

  const backDocCategory = app.querySelector("[data-back-documents-category]");
  if (backDocCategory) backDocCategory.onclick = () => { state.documentsOpenCategory = null; render(); };

  const backToAccueil = app.querySelector("[data-back-to-accueil]");
  if (backToAccueil) backToAccueil.onclick = () => { state.tab = "accueil"; render(); };

  const backToProfil = app.querySelector("[data-back-to-profil]");
  if (backToProfil) backToProfil.onclick = () => { state.tab = "profil"; state.checkinOpen = false; render(); };

  app.querySelectorAll("[data-set-daytype]").forEach(b => b.onclick = () => {
    state.nutritionDayType = b.dataset.setDaytype;
    render();
  });

  app.querySelectorAll("[data-nutrition-subview]").forEach(b => b.onclick = () => {
    state.nutritionSubView = b.dataset.nutritionSubview;
    state.selectedFood = null;
    if ((state.nutritionSubView === "recent" || state.nutritionSubView === "frequent") && state.allFoodLogs === null) {
      loadAllFoodLogs();
    }
    if (state.nutritionSubView === "scanned" && state.scannedProducts === null) {
      loadScannedProducts();
    }
    if (state.nutritionSubView === "recipes" && state.recipes === null) {
      loadRecipes();
    }
    render();
  });

  app.querySelectorAll("[data-open-recipe]").forEach(b => b.onclick = () => {
    state.recipeOpenId = b.dataset.openRecipe;
    render();
  });

  const backRecipeBtn = app.querySelector("[data-back-recipe]");
  if (backRecipeBtn) backRecipeBtn.onclick = () => { state.recipeOpenId = null; render(); };

  const logRecipeBtn = app.querySelector("[data-log-recipe]");
  if (logRecipeBtn) logRecipeBtn.onclick = async () => {
    const r = state.recipes.find(r => r.id === logRecipeBtn.dataset.logRecipe);
    if (!r) return;
    logRecipeBtn.textContent = "Ajout…";
    logRecipeBtn.disabled = true;
    const entry = {
      client_id: state.client.id, log_date: todayISO(), food_name: r.title,
      grams: 1, kcal: r.kcal, protein: r.protein, carbs: r.carbs, fat: r.fat,
    };
    const { data, error } = await sb.from("food_logs").insert(entry).select().single();
    if (error) { showToast("Erreur lors de l'ajout."); logRecipeBtn.disabled = false; logRecipeBtn.textContent = "✓ Ajouter à mon repas"; return; }
    state.foodLogsToday.push(data);
    state.recipeOpenId = null;
    state.nutritionSubView = "recherche";
    showToast("Recette ajoutée à ton repas !");
    render();
  };

  app.querySelectorAll("[data-select-scanned]").forEach(b => b.onclick = () => {
    const p = state.scannedProducts.find(p => p.barcode === b.dataset.selectScanned);
    if (!p) return;
    state.selectedFood = {
      name: p.name, kcalPer100: p.kcal_per_100, proteinPer100: p.protein_per_100,
      carbsPer100: p.carbs_per_100, fatPer100: p.fat_per_100,
    };
    render();
  });

  app.querySelectorAll("[data-reuse-food]").forEach(b => b.onclick = () => {
    const [name, kcal, protein, carbs, fat, grams] = b.dataset.reuseFood.split("|");
    state.selectedFood = {
      name, kcalPer100: parseFloat(kcal), proteinPer100: parseFloat(protein),
      carbsPer100: parseFloat(carbs), fatPer100: parseFloat(fat), defaultGrams: grams,
    };
    render();
  });

  const toggleCreateFoodBtn = app.querySelector("[data-toggle-create-food]");
  app.querySelectorAll("[data-open-scanner]").forEach(b => b.onclick = () => openScanner());
  if (toggleCreateFoodBtn) toggleCreateFoodBtn.onclick = () => { state.showCreateFood = !state.showCreateFood; render(); };

  const cancelCreateFoodBtn = app.querySelector("[data-cancel-create-food]");
  if (cancelCreateFoodBtn) cancelCreateFoodBtn.onclick = () => { state.showCreateFood = false; render(); };

  const createFoodBtn = app.querySelector("#createFoodBtn");
  if (createFoodBtn) createFoodBtn.onclick = async () => {
    const name = document.getElementById("newFoodName").value.trim();
    const kcal = parseFloat(document.getElementById("newFoodKcal").value);
    const protein = parseFloat(document.getElementById("newFoodProtein").value) || 0;
    const carbs = parseFloat(document.getElementById("newFoodCarbs").value) || 0;
    const fat = parseFloat(document.getElementById("newFoodFat").value) || 0;
    if (!name || isNaN(kcal)) { alert("Donne au moins un nom et des kcal pour 100g."); return; }
    createFoodBtn.textContent = "Création…";
    createFoodBtn.disabled = true;
    const { data, error } = await sb.from("custom_foods").insert({
      name, kcal_per_100: kcal, protein_per_100: protein, carbs_per_100: carbs, fat_per_100: fat,
      created_by: state.client.id,
    }).select().single();
    if (error) { showToast("Erreur : " + error.message); createFoodBtn.disabled = false; createFoodBtn.textContent = "✓ Créer et utiliser"; return; }
    state.customFoods.push(data);
    state.selectedFood = { name, kcalPer100: kcal, proteinPer100: protein, carbsPer100: carbs, fatPer100: fat };
    state.showCreateFood = false;
    showToast("Aliment créé et ajouté à la base !");
    render();
  };

  const foodSearchBtn = app.querySelector("#foodSearchBtn");
  if (foodSearchBtn) foodSearchBtn.onclick = async () => {
    const query = document.getElementById("foodSearchInput").value.trim();
    if (!query) return;
    state.foodSearchQuery = query;
    state.foodSearchLoading = true;
    state.selectedFood = null;
    render();

    const localResults = searchLocalFoods(query);
    let offResults = [];
    try {
      const res = await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=8`);
      const data = await res.json();
      offResults = (data.products || [])
        .filter(p => p.product_name && p.nutriments && p.nutriments["energy-kcal_100g"] != null)
        .map(p => ({
          name: p.product_name,
          brand: p.brands || "",
          kcalPer100: Math.round(p.nutriments["energy-kcal_100g"] || 0),
          proteinPer100: Math.round(p.nutriments["proteins_100g"] || 0),
          carbsPer100: Math.round(p.nutriments["carbohydrates_100g"] || 0),
          fatPer100: Math.round(p.nutriments["fat_100g"] || 0),
          source: "off",
        }));
    } catch (e) {
      // pas grave si Open Food Facts échoue : les résultats bruts locaux restent disponibles
      offResults = [];
    }
    state.foodSearchResults = [...localResults, ...offResults];
    state.foodSearchLoading = false;
    render();
  };

  app.querySelectorAll("[data-select-food]").forEach(b => b.onclick = () => {
    state.selectedFood = state.foodSearchResults[parseInt(b.dataset.selectFood, 10)];
    render();
  });

  const cancelFoodBtn = app.querySelector("[data-cancel-food]");
  if (cancelFoodBtn) cancelFoodBtn.onclick = () => { state.selectedFood = null; render(); };

  const addFoodBtn = app.querySelector("#addFoodBtn");
  if (addFoodBtn) addFoodBtn.onclick = async () => {
    const grams = parseFloat(document.getElementById("foodGramsInput").value);
    if (!grams || grams <= 0) { alert("Entre un poids valide."); return; }
    const f = state.selectedFood;
    const ratio = grams / 100;
    const entry = {
      client_id: state.client.id,
      log_date: todayISO(),
      food_name: f.name,
      grams,
      kcal: Math.round(f.kcalPer100 * ratio),
      protein: Math.round(f.proteinPer100 * ratio),
      carbs: Math.round(f.carbsPer100 * ratio),
      fat: Math.round(f.fatPer100 * ratio),
    };
    addFoodBtn.textContent = "Ajout…";
    addFoodBtn.disabled = true;
    const { data, error } = await sb.from("food_logs").insert(entry).select().single();
    if (error) { showToast("Erreur lors de l'ajout."); addFoodBtn.disabled = false; addFoodBtn.textContent = "✓ Ajouter"; return; }
    state.foodLogsToday.push(data);
    state.selectedFood = null;
    state.foodSearchResults = [];
    state.foodSearchQuery = "";
    showToast("Aliment ajouté.");
    render();
  };

  app.querySelectorAll("[data-delete-food]").forEach(b => b.onclick = async () => {
    const id = b.dataset.deleteFood;
    b.disabled = true;
    const { error } = await sb.from("food_logs").delete().eq("id", id);
    if (error) { showToast("Erreur lors de la suppression."); b.disabled = false; return; }
    state.foodLogsToday = state.foodLogsToday.filter(f => f.id !== id);
    if (state.allFoodLogs) state.allFoodLogs = state.allFoodLogs.filter(f => f.id !== id);
    showToast("Aliment supprimé.");
    render();
  });

  app.querySelectorAll("[data-open-checkin]").forEach(b => b.onclick = () => { openCheckin(); });

  app.querySelectorAll("[data-checkin-view]").forEach(b => b.onclick = () => {
    state.checkinView = b.dataset.checkinView;
    render();
  });

  const gotoCheckinBtn = app.querySelector("[data-goto-checkin]");
  if (gotoCheckinBtn) gotoCheckinBtn.onclick = () => { state.tab = "profil"; openCheckin(); };

  app.querySelectorAll("[data-scale]").forEach(b => b.onclick = () => {
    if (!state.checkinDraft) state.checkinDraft = {};
    state.checkinDraft[b.dataset.scale] = parseInt(b.dataset.value, 10);
    render();
  });

  app.querySelectorAll("[data-bool]").forEach(b => b.onclick = () => {
    if (!state.checkinDraft) state.checkinDraft = {};
    state.checkinDraft[b.dataset.bool] = b.dataset.value === "true";
    render();
  });

  const submitCheckinBtn = app.querySelector("#submitCheckinBtn");
  if (submitCheckinBtn) submitCheckinBtn.onclick = async () => {
    submitCheckinBtn.textContent = "Envoi…";
    submitCheckinBtn.disabled = true;
    const d = state.checkinDraft || {};
    const num = (id) => {
      const v = document.getElementById(id)?.value;
      return v === "" || v === undefined ? null : parseFloat(v);
    };

    const uploadIfPresent = async (inputId, existingUrl) => {
      const input = document.getElementById(inputId);
      const file = input && input.files[0];
      if (!file) return existingUrl || null;
      const path = `${state.client.id}-${isoWeekKey(todayISO())}-${inputId}-${Date.now()}-${file.name}`;
      const { error } = await sb.storage.from("checkin-photos").upload(path, file);
      if (error) { showToast("Erreur d'upload : " + inputId); return existingUrl || null; }
      const { data } = sb.storage.from("checkin-photos").getPublicUrl(path);
      return data.publicUrl;
    };

    const photoFrontUrl = await uploadIfPresent("photoFront", state.checkinExisting?.photo_front_url);
    const photoBackUrl = await uploadIfPresent("photoBack", state.checkinExisting?.photo_back_url);
    const photoSideUrl = await uploadIfPresent("photoSide", state.checkinExisting?.photo_side_url);
    const stepsUrl = await uploadIfPresent("stepsScreenshot", state.checkinExisting?.steps_screenshot_url);

    const payload = {
      client_id: state.client.id,
      week_key: isoWeekKey(todayISO()),
      feeling: d.feeling ?? null,
      water_3l: d.water_3l ?? null,
      pain_other: d.pain_other ?? null,
      pain_detail: document.getElementById("painDetail")?.value || null,
      sleep_quality: d.sleep_quality ?? null,
      stress_level: d.stress_level ?? null,
      nutrition_respect: document.getElementById("nutritionRespect")?.value || null,
      motivation: d.motivation ?? null,
      missed_sessions: d.missed_sessions ?? null,
      missed_reason: document.getElementById("missedReason")?.value || null,
      bodyweight: num("bodyweight"),
      arm_left: num("armLeft"), arm_right: num("armRight"),
      leg_left: num("legLeft"), leg_right: num("legRight"),
      shoulders: num("shoulders"), waist: num("waist"),
      photo_front_url: photoFrontUrl, photo_back_url: photoBackUrl,
      photo_side_url: photoSideUrl, steps_screenshot_url: stepsUrl,
    };

    const { error } = await sb.from("weekly_checkins").upsert(payload, { onConflict: "client_id,week_key" });
    if (error) { showToast("Erreur : " + error.message); submitCheckinBtn.textContent = "✓ Envoyer mon bilan"; submitCheckinBtn.disabled = false; return; }
    showToast("Bilan envoyé, bravo !");
    state.checkinOpen = false;
    state.checkinDraft = null;
    state.checkinExisting = null;
    state.checkinSubmittedThisWeek = true;
    render();
  };
}

function updateCountersOnly() {
  const app = document.getElementById("app");
  const day = state.program.find(d => d.id === state.openDayId);
  if (!day) return;
  let totalSets = 0, filledSets = 0;
  day.exercises.forEach(e => {
    const rows = parseTargetSets(e.sets);
    totalSets += rows.length;
    const cur = state.sessionInputs[e.id] || [];
    filledSets += cur.filter(r => r.kg !== "" && r.kg !== undefined).length;
  });
  const validateBtn = app.querySelector("[data-validate]");
  if (validateBtn) {
    validateBtn.textContent = `✓ Valider la séance (${filledSets}/${totalSets} séries)`;
    validateBtn.disabled = filledSets === 0;
  }
  day.exercises.forEach(e => {
    const rows = parseTargetSets(e.sets);
    const cur = state.sessionInputs[e.id] || rows.map(r => ({ reps: r, kg: "" }));
    const doneCount = cur.filter(r => r.kg !== "" && r.kg !== undefined).length;
    const btn = app.querySelector(`[data-toggle-ex="${e.id}"] span[style*="font-family:var(--mono)"]`);
    if (btn) btn.textContent = `${doneCount}/${rows.length}`;
  });
}

/* ---------------- Init ---------------- */
document.querySelectorAll(".nav-btn").forEach(b => b.onclick = () => {
  state.tab = b.dataset.tab;
  state.openDayId = null;
  state.recapLogId = null;
  state.historyOpenLogId = null;
  state.historyDraft = null;
  state.selectedFood = null;
  state.checkinOpen = false;
  state.documentsOpenCategory = null;
  render();
});

document.getElementById("themeToggle").onclick = () => {
  state.dark = !state.dark;
  document.body.className = state.dark ? "dark" : "light";
  document.getElementById("themeToggle").textContent = state.dark ? "🌙" : "☀️";
};

document.getElementById("scannerCloseBtn").onclick = () => { closeScanner(); };

document.getElementById("manualBarcodeBtn").onclick = async () => {
  const input = document.getElementById("manualBarcodeInput");
  const btn = document.getElementById("manualBarcodeBtn");
  const val = input.value.trim();
  if (!val) return;
  btn.disabled = true;
  input.disabled = true;
  btn.textContent = "…";
  try {
    await onBarcodeScanned(val);
  } catch (e) {
    setScannerStatus("Erreur inattendue, réessaie.");
  }
  input.value = "";
  btn.disabled = false;
  input.disabled = false;
  btn.textContent = "OK";
};
document.getElementById("manualBarcodeInput").onkeydown = (e) => {
  if (e.key === "Enter") { e.preventDefault(); document.getElementById("manualBarcodeBtn").click(); }
};

boot();
</script>
</body>
