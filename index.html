function getDeadlineDate() {
  const cs = state.checkinSettings;
  if (!cs) return null;
  const order = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi", "Dimanche"];
  const targetIdx = order.indexOf(cs.deadline_day);
  if (targetIdx === -1) return null;
  const now = new Date();
  const jsDay = (now.getDay() + 6) % 7; // Monday = 0
  const monday = new Date(now);
  monday.setDate(now.getDate() - jsDay);
  monday.setHours(0, 0, 0, 0);
  const deadline = new Date(monday);
  deadline.setDate(monday.getDate() + targetIdx);
  const [h, m] = (cs.deadline_time || "20:00").split(":").map(Number);
  deadline.setHours(h, m, 0, 0);
  return deadline;
}

function isoWeekKey(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  const day = (d.getDay() + 6) % 7;
  d.setDate(d.getDate() - day + 3);
  const firstThursday = new Date(d.getFullYear(), 0, 4);
  const week = 1 + Math.round(((d - firstThursday) / 86400000 - 3 + ((firstThursday.getDay() + 6) % 7)) / 7);
  return `${d.getFullYear()}-W${week}`;
}

function parseTargetSets(str) {
  const parts = String(str || "").split(",").map(s => s.trim()).filter(Boolean);
  const rows = [];
  parts.forEach(p => {
    const m = p.match(/(\d+)\s*[x×]\s*(.+)/i);
    if (m) {
      const count = parseInt(m[1], 10);
      const reps = m[2].trim();
      for (let i = 0; i < count; i++) rows.push(reps);
    } else if (p) rows.push(p);
  });
  return rows.length ? rows : ["-"];
}

function formatDateFR(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit", year: "numeric" });
}

function rangeTop(str) {
  const m = String(str || "").match(/(\d+)\s*-\s*(\d+)/);
  return m ? parseInt(m[2], 10) : null;
}
function firstRepNumber(str) {
  const m = String(str || "").match(/(\d+)/);
  return m ? parseInt(m[1], 10) : null;
}

function buildSuggestion(lastEntry, targetRows) {
  if (!lastEntry || !lastEntry.sets || !lastEntry.sets[0]) return null;
  const first = lastEntry.sets[0];
  const repsNum = parseInt(first.reps, 10);
  const kg = parseFloat(first.kg);
  if (isNaN(repsNum) || isNaN(kg)) return null;
  const top = rangeTop(targetRows[0]) || firstRepNumber(targetRows[0]);
  if (top && repsNum >= top) {
    return `Monte le poids (+2,5 kg) et vise le bas de la fourchette`;
  }
  return `Vise ${repsNum + 1} reps à ${kg} kg (+1 rep vs. la semaine dernière)`;
}

let uidN = 1;
const uid = (p) => `${p}-${uidN++}`;
function ex(name, muscle, sets, rest, superset, video) {
  return { id: uid("ex"), name, muscle, sets, rest, superset: superset || null, video: video || null };
}

function groupExercises(exercises) {
  const groups = [];
  let i = 0;
  while (i < exercises.length) {
    const e = exercises[i];
    if (e.superset) {
      const items = [e];
      let j = i + 1;
      while (j < exercises.length && exercises[j].superset === e.superset) { items.push(exercises[j]); j++; }
      groups.push({ type: "superset", key: e.superset, items });
      i = j;
    } else {
      groups.push({ type: "single", items: [e] });
      i++;
    }
  }
  return groups;
}

// Fast food — valeurs approximatives par produit (poids officiel/typique x kcal/macros
// publiés). Recettes susceptibles d'évoluer légèrement selon les pays et les années.
function ff(name, weightG, kcalTotal, proteinTotal, carbsTotal, fatTotal) {
  const r = 100 / weightG;
  return {
    name, defaultGrams: weightG,
    kcalPer100: Math.round(kcalTotal * r),
    proteinPer100: Math.round(proteinTotal * r * 10) / 10,
    carbsPer100: Math.round(carbsTotal * r * 10) / 10,
    fatPer100: Math.round(fatTotal * r * 10) / 10,
  };
}

function searchLocalFoods(query) {
  const q = query.toLowerCase().trim();
  if (!q) return [];
  const fromLibrary = RAW_FOOD_LIBRARY.filter(f => f.name.toLowerCase().includes(q)).map(f => ({ ...f, brand: "", source: "local" }));
  const fromFastFood = FASTFOOD_LIBRARY.filter(f => f.name.toLowerCase().includes(q)).map(f => ({ ...f, brand: "", source: "fastfood" }));
  const fromCustom = (state.customFoods || []).filter(f => f.name.toLowerCase().includes(q)).map(f => ({
    name: f.name, brand: "", kcalPer100: f.kcal_per_100, proteinPer100: f.protein_per_100,
    carbsPer100: f.carbs_per_100, fatPer100: f.fat_per_100, source: "custom",
  }));
  const fromScanned = (state.scannedProducts || []).filter(f => f.name.toLowerCase().includes(q)).map(f => ({
    name: f.name, brand: "", kcalPer100: f.kcal_per_100, proteinPer100: f.protein_per_100,
    carbsPer100: f.carbs_per_100, fatPer100: f.fat_per_100, source: "scanned",
  }));
  return [...fromCustom, ...fromScanned, ...fromFastFood, ...fromLibrary];
}

/* ---------------- Barcode scanner ---------------- */
// Deliberately kept outside the normal render() cycle: the scanner overlay lives
// in the static HTML (not inside #app), so re-rendering the rest of the app never
// tears down the live camera feed or crashes the scan in progress.
let scannerInstance = null;
let torchOn = false;

function setupTorchToggle() {
  const btn = document.getElementById("torchToggleBtn");
  torchOn = false;
  btn.style.display = "none";
  btn.textContent = "💡 Lampe torche";
  try {
    const caps = scannerInstance.getRunningTrackCapabilities();
    if (caps && caps.torch) {
      btn.style.display = "inline-block";
      btn.onclick = async () => {
        try {
          await scannerInstance.applyVideoConstraints({ advanced: [{ torch: !torchOn }] });
          torchOn = !torchOn;
          btn.textContent = torchOn ? "💡 Éteindre la lampe" : "💡 Lampe torche";
        } catch (e) { /* certains appareils refusent le changement à chaud, sans impact */ }
      };
    }
  } catch (e) { /* pas grave si les capacités ne sont pas exposées sur cet appareil */ }
}

function setScannerStatus(msg) {
  const el = document.getElementById("scannerStatus");
  if (el) el.textContent = msg;
}

async function openScanner() {
  const overlay = document.getElementById("scannerOverlay");
  overlay.style.display = "flex";
  setScannerStatus("Vise le code-barres du produit avec la caméra.");
  const manualInput = document.getElementById("manualBarcodeInput");
  manualInput.value = "";
  manualInput.disabled = false;
  const manualBtn = document.getElementById("manualBarcodeBtn");
  manualBtn.disabled = false;
  manualBtn.textContent = "OK";

  if (typeof Html5Qrcode === "undefined") {
    setScannerStatus("Le scanner n'a pas pu se charger (pas de connexion ?). Ferme et utilise la recherche manuelle.");
    return;
  }

  try {
    scannerInstance = new Html5Qrcode("qr-reader");
    const formats = [
      Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A, Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.CODE_128,
    ];
    await scannerInstance.start(
      { facingMode: { ideal: "environment" }, advanced: [{ focusMode: "continuous" }] },
      {
        fps: 8,
        qrbox: (viewfinderWidth, viewfinderHeight) => {
          const w = Math.min(viewfinderWidth * 0.9, 380);
          return { width: w, height: Math.round(w * 0.42) };
        },
        formatsToSupport: formats,
        videoConstraints: {
          facingMode: { ideal: "environment" },
          advanced: [{ focusMode: "continuous" }],
          width: { ideal: 1920 }, height: { ideal: 1080 },
        },
      },
      (decodedText) => { onBarcodeScanned(decodedText); },
      () => { /* échec de lecture sur une frame donnée : normal, on continue */ }
    );
    setupTorchToggle();
  } catch (e) {
    setScannerStatus("Impossible d'accéder à la caméra. Vérifie que tu as autorisé l'accès, ou ferme et cherche manuellement.");
  }
}

async function closeScanner() {
  const overlay = document.getElementById("scannerOverlay");
  const torchBtn = document.getElementById("torchToggleBtn");
  torchBtn.style.display = "none";
  torchOn = false;
  if (scannerInstance) {
    try {
      await scannerInstance.stop();
      scannerInstance.clear();
    } catch (e) { /* déjà arrêté, rien à faire */ }
    scannerInstance = null;
  }
  overlay.style.display = "none";
}

async function onBarcodeScanned(barcode) {
  setScannerStatus(`Code détecté (${barcode}) — recherche du produit…`);
  try {
    // 1. Un client (n'importe lequel) a peut-être déjà scanné ce produit : cache instantané
    const { data: cached } = await sb.from("scanned_products").select("*").eq("barcode", barcode).maybeSingle();
    if (cached) {
      await closeScanner();
      state.selectedFood = {
        name: cached.name, kcalPer100: cached.kcal_per_100, proteinPer100: cached.protein_per_100,
        carbsPer100: cached.carbs_per_100, fatPer100: cached.fat_per_100,
      };
      state.tab = "nutrition";
      state.nutritionSubView = "recherche";
      showToast("Produit trouvé (déjà scanné) !");
      render();
      return;
    }

    // 2. Sinon on interroge Open Food Facts, et on garde le résultat pour la prochaine fois
    const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${barcode}.json`);
    const data = await res.json();
    if (data.status !== 1 || !data.product) {
      setScannerStatus("Produit introuvable dans la base. Ferme et cherche-le manuellement, ou re-scanne.");
      return;
    }
    const p = data.product;
    const n = p.nutriments || {};
    if (n["energy-kcal_100g"] == null) {
      setScannerStatus("Ce produit n'a pas de valeurs nutritionnelles renseignées. Ferme et cherche-le manuellement.");
      return;
    }
    const food = {
      name: p.product_name || "Produit scanné",
      kcalPer100: Math.round(n["energy-kcal_100g"] || 0),
      proteinPer100: Math.round(n["proteins_100g"] || 0),
      carbsPer100: Math.round(n["carbohydrates_100g"] || 0),
      fatPer100: Math.round(n["fat_100g"] || 0),
    };
    const cacheRow = {
      barcode, name: food.name, kcal_per_100: food.kcalPer100, protein_per_100: food.proteinPer100,
      carbs_per_100: food.carbsPer100, fat_per_100: food.fatPer100,
    };
    await sb.from("scanned_products").upsert(cacheRow);
    if (state.scannedProducts) state.scannedProducts.unshift({ ...cacheRow, created_at: new Date().toISOString() });

    await closeScanner();
    state.selectedFood = food;
    state.tab = "nutrition";
    state.nutritionSubView = "recherche";
    showToast("Produit trouvé !");
    render();
  } catch (e) {
    setScannerStatus("Erreur réseau. Vérifie ta connexion, ou ferme et cherche manuellement.");
  }
}


function randomAccessCode() {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // sans caractères ambigus
  let s = "";
  for (let i = 0; i < 8; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s.slice(0, 4) + "-" + s.slice(4);
}

async function loadClientByCode(code) {
  const { data: clientRow, error } = await sb.from("clients").select("*").eq("access_code", code).maybeSingle();
  if (error || !clientRow) return false;
  const { data: progRow } = await sb.from("programs").select("program_json").eq("client_id", clientRow.id).maybeSingle();
  const program = (progRow && progRow.program_json) ? progRow.program_json : DEFAULT_PROGRAM;
  const { data: logs } = await sb.from("session_logs").select("*").eq("client_id", clientRow.id).order("log_date", { ascending: true });
  const { data: notesRows } = await sb.from("exercise_notes").select("*").eq("client_id", clientRow.id);
  state.client = { id: clientRow.id, name: clientRow.name, access_code: clientRow.access_code };
  state.program = program;
  state.sessionLogs = (logs || []).map(l => ({ id: l.id, dayId: l.day_id, date: l.log_date, entries: l.entries, rpe: l.rpe, session_comment: l.session_comment }));
  state.notes = {};
  (notesRows || []).forEach(n => { state.notes[n.exercise_id] = n.note; });
  state.documents = null;

  const { data: nutriRow } = await sb.from("nutrition_targets").select("*").eq("client_id", clientRow.id).maybeSingle();
  state.nutritionTargets = nutriRow || null;
  const { data: stepsRow } = await sb.from("steps_targets").select("*").eq("client_id", clientRow.id).maybeSingle();
  state.stepsTarget = stepsRow ? stepsRow.daily_steps : null;
  state.waterTarget = stepsRow ? stepsRow.water_liters : null;
  const { data: msgRow } = await sb.from("coach_messages").select("*").eq("client_id", clientRow.id).maybeSingle();
  state.coachMessage = msgRow ? msgRow.message : null;

  const todayDay = state.program.find(d => d.day === ["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"][new Date().getDay()]);
  state.nutritionDayType = (todayDay && !todayDay.isRest) ? "on" : "off";

  const { data: foodRows } = await sb.from("food_logs").select("*").eq("client_id", clientRow.id).eq("log_date", todayISO()).order("created_at", { ascending: true });
  state.foodLogsToday = foodRows || [];

  const { data: customFoodsData } = await sb.from("custom_foods").select("*").order("name", { ascending: true });
  state.customFoods = customFoodsData || [];
  const { data: scannedData } = await sb.from("scanned_products").select("*").order("created_at", { ascending: false }).limit(500);
  state.scannedProducts = scannedData || [];

  const { data: settingsRow } = await sb.from("checkin_settings").select("*").eq("client_id", clientRow.id).maybeSingle();
  state.checkinSettings = settingsRow || { deadline_day: "Dimanche", deadline_time: "20:00" };

  const { data: thisWeekCheckin } = await sb.from("weekly_checkins").select("id").eq("client_id", clientRow.id).eq("week_key", isoWeekKey(todayISO())).maybeSingle();
  state.checkinSubmittedThisWeek = !!thisWeekCheckin;

  localStorage.setItem(ACCESS_KEY, code);
  return true;
}

async function boot() {
  const saved = localStorage.getItem(ACCESS_KEY);
  if (saved) {
    const ok = await loadClientByCode(saved);
    if (ok) { state.screen = "app"; render(); return; }
  }
  state.screen = "access";
  render();
}

/* ---------------- Render dispatcher ---------------- */
function render() {
  const app = document.getElementById("app");
  const nav = document.querySelector(".bottom-nav");

  if (state.screen === "loading") {
    nav.style.display = "none";
    app.innerHTML = `<div class="center-screen" style="text-align:center;color:var(--textDim);">Chargement…</div>`;
    return;
  }
  if (state.screen === "access") {
    nav.style.display = "none";
    app.innerHTML = renderAccessScreen();
    attachAccessHandlers();
    return;
  }
  if (state.screen === "coach") {
    nav.style.display = "none";
    app.innerHTML = state.programBuilderOpen ? renderProgramBuilder() : renderCoachScreen();
    attachCoachHandlers();
    return;
  }

  nav.style.display = "";
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === state.tab));

  if (state.recapLogId) {
    app.innerHTML = renderRecap(state.recapLogId);
  } else if (state.tab === "accueil") {
    app.innerHTML = renderAccueil();
    if (state.documents === null) loadDocuments();
  } else if (state.tab === "seance") {
    const day = state.program.find(d => d.id === state.openDayId);
    app.innerHTML = day ? renderSession(day) : renderHome();
  } else if (state.tab === "nutrition") {
    app.innerHTML = renderNutrition();
  } else if (state.tab === "historique") {
    app.innerHTML = state.historyOpenLogId ? renderHistoriqueDetail(state.historyOpenLogId) : renderHistorique();
  } else if (state.tab === "documents") {
    app.innerHTML = renderDocuments();
    if (state.documents === null) loadDocuments();
  } else if (state.tab === "suivi") {
    app.innerHTML = state.suiviView === "corps" ? renderBodyProgress() : state.suiviView === "tonnage" ? renderTonnageProgress() : renderProgress();
    if (state.suiviView === "corps" && state.checkinsHistory === null) loadCheckinsHistory();
  } else {
    app.innerHTML = state.checkinOpen ? renderCheckin() : renderProfil();
  }
  attachHandlers();
}

function attachAccessHandlers() {
  const submitBtn = document.getElementById("accessSubmitBtn");
  const input = document.getElementById("accessCodeInput");
  const submit = async () => {
    const code = input.value.trim().toUpperCase();
    if (!code) return;
    submitBtn.textContent = "Vérification…";
    submitBtn.disabled = true;
    const ok = await loadClientByCode(code);
    if (ok) {
      state.screen = "app";
      state.accessError = "";
      render();
    } else {
      state.accessError = "Code inconnu — vérifie auprès de ton coach.";
      submitBtn.textContent = "Valider";
      submitBtn.disabled = false;
      render();
    }
  };
  if (submitBtn) submitBtn.onclick = submit;
  if (input) input.onkeydown = (e) => { if (e.key === "Enter") submit(); };
  const goCoach = document.querySelector("[data-go-coach]");
  if (goCoach) goCoach.onclick = () => { state.screen = "coach"; state.coachAuthed = false; render(); };
}

          </button>`).join("")}
          ${results.length === 0 ? `<div style="color:var(--textDim);font-size:13.5px;padding:8px 0;">Aucun résultat — essaie "+ Exercice personnalisé" ci-dessous.</div>` : ""}

    }
  }

  html += `<button class="validate-btn" data-save-builder="1">✓ Enregistrer le programme complet</button>`;
  return html;
}

async function attachCoachHandlers() {
  document.querySelectorAll("[data-open-builder]").forEach(b => b.onclick = () => openProgramBuilder(b.dataset.openBuilder));

  const closeBuilderBtn = document.querySelector("[data-close-builder]");
  if (closeBuilderBtn) closeBuilderBtn.onclick = () => {
    if (!confirm("Quitter sans enregistrer ? Les modifications non enregistrées seront perdues.")) return;
    state.programBuilderOpen = false;
    state.programBuilderClientId = null;
    state.programBuilderDraft = null;
    render();
  };

  document.querySelectorAll("[data-builder-day]").forEach(b => b.onclick = () => {
    state.programBuilderDayId = b.dataset.builderDay;
    state.libraryOpenForDay = null;
    render();
  });

  const dayIsRestInput = document.getElementById("dayIsRest");
  if (dayIsRestInput) dayIsRestInput.onchange = () => {
    const day = state.programBuilderDraft.find(d => d.id === state.programBuilderDayId);
    day.isRest = dayIsRestInput.checked;
    if (!day.isRest) {
      if (!day.exercises) day.exercises = [];
      if (!day.name) day.name = "Séance";
    }
    render();
  };

  const dayNameInput = document.getElementById("dayName");
  if (dayNameInput) dayNameInput.onblur = () => {
    const day = state.programBuilderDraft.find(d => d.id === state.programBuilderDayId);
    day.name = dayNameInput.value;
  };

  document.querySelectorAll("[data-b-field]").forEach(inp => {
    inp.onblur = () => {
      const day = state.programBuilderDraft.find(d => d.id === state.programBuilderDayId);
      const idx = parseInt(inp.dataset.idx, 10);
      const field = inp.dataset.bField;
      day.exercises[idx][field] = field === "video" ? (inp.value.trim() || null) : inp.value;
    };
  });

  document.querySelectorAll("[data-b-move]").forEach(b => b.onclick = () => {
    const day = state.programBuilderDraft.find(d => d.id === state.programBuilderDayId);
    const idx = parseInt(b.dataset.idx, 10);
    const newIdx = idx + (b.dataset.bMove === "up" ? -1 : 1);
    if (newIdx < 0 || newIdx >= day.exercises.length) return;
    [day.exercises[idx], day.exercises[newIdx]] = [day.exercises[newIdx], day.exercises[idx]];
    render();
  });

  document.querySelectorAll("[data-b-superset]").forEach(b => b.onclick = () => {
    const day = state.programBuilderDraft.find(d => d.id === state.programBuilderDayId);
    const idx = parseInt(b.dataset.bSuperset, 10);
    const current = day.exercises[idx];
    const next = day.exercises[idx + 1];
    if (!next) return;
    const alreadyLinked = current.superset && next.superset === current.superset;
    if (alreadyLinked) {
      const key = current.superset;
      current.superset = null;
      if (next.superset === key) next.superset = null;
    } else {
      const key = current.superset || uid("ss");
      current.superset = key;
      next.superset = key;
    }
    render();
  });

  document.querySelectorAll("[data-b-delete]").forEach(b => b.onclick = () => {
    const day = state.programBuilderDraft.find(d => d.id === state.programBuilderDayId);
    day.exercises.splice(parseInt(b.dataset.bDelete, 10), 1);
    render();
  });

  const openLibraryBtn = document.querySelector("[data-open-library]");
  if (openLibraryBtn) openLibraryBtn.onclick = () => {
    state.libraryOpenForDay = state.libraryOpenForDay === state.programBuilderDayId ? null : state.programBuilderDayId;
    state.libraryQuery = "";
    render();
  };

  const libraryQueryInput = document.getElementById("libraryQuery");
  if (libraryQueryInput) libraryQueryInput.oninput = () => {
    state.libraryQuery = libraryQueryInput.value;
    render();
    const el = document.getElementById("libraryQuery");
    if (el) { el.focus(); el.selectionStart = el.selectionEnd = el.value.length; }
  };

  document.querySelectorAll("[data-add-from-library]").forEach(b => b.onclick = () => {
    const [name, muscle] = b.dataset.addFromLibrary.split("|");
    const day = state.programBuilderDraft.find(d => d.id === state.programBuilderDayId);
    day.exercises.push(ex(name, muscle, "3x10-12", "90s"));
    state.libraryOpenForDay = null;
    render();
  });

  const addCustomBtn = document.querySelector("[data-add-custom]");
  if (addCustomBtn) addCustomBtn.onclick = () => {
    const name = prompt("Nom de l'exercice :");
    if (!name) return;
    const muscle = prompt("Groupe musculaire :") || "Muscle";
    const day = state.programBuilderDraft.find(d => d.id === state.programBuilderDayId);
    day.exercises.push(ex(name, muscle, "3x10-12", "90s"));
    state.libraryOpenForDay = null;
    render();
  };

  const saveBuilderBtn = document.querySelector("[data-save-builder]");
  if (saveBuilderBtn) saveBuilderBtn.onclick = async () => {
    saveBuilderBtn.textContent = "Enregistrement…";
    saveBuilderBtn.disabled = true;
    const { error } = await sb.from("programs").update({ program_json: state.programBuilderDraft, updated_at: new Date().toISOString() }).eq("client_id", state.programBuilderClientId);
    if (error) { showToast("Erreur : " + error.message); saveBuilderBtn.disabled = false; saveBuilderBtn.textContent = "✓ Enregistrer le programme complet"; return; }
    const c = state.coachClients.find(c => c.id === state.programBuilderClientId);
    if (c) c.program_json = state.programBuilderDraft;
    showToast("Programme enregistré !");
    state.programBuilderOpen = false;
    state.programBuilderClientId = null;
    state.programBuilderDraft = null;
    render();
  };

  const backAccess = document.querySelector("[data-back-access]");
  if (backAccess) backAccess.onclick = () => { state.screen = "access"; render(); };

  const coachSubmitBtn = document.getElementById("coachSubmitBtn");
  if (coachSubmitBtn) coachSubmitBtn.onclick = async () => {
    const val = document.getElementById("coachPasswordInput").value;
    if (val === COACH_PASSWORD) {
      state.coachAuthed = true;
      state.coachError = "";
      const { data } = await sb.from("clients").select("*, programs(program_json)").order("created_at", { ascending: false });
      state.coachClients = (data || []).map(c => ({
        id: c.id, name: c.name, access_code: c.access_code,
        program_json: c.programs ? c.programs.program_json : null,
      }));
      const { data: docsData } = await sb.from("documents").select("*, clients(name)").order("created_at", { ascending: false });
      state.coachDocuments = docsData || [];
      const { data: recipesData } = await sb.from("recipes").select("*").order("category", { ascending: true }).order("title", { ascending: true });
      state.coachRecipes = recipesData || [];
      render();
      await loadCoachOverview();
      render();
    } else {
      state.coachError = "Mot de passe incorrect.";
      render();
    }
  };

  async function loadCoachOverview() {
    const week = isoWeekKey(todayISO());
    await Promise.all(state.coachClients.map(async (c) => {
      const program = c.program_json || DEFAULT_PROGRAM;
      const trainingDaysTotal = program.filter(d => !d.isRest).length;

      const { data: logs } = await sb.from("session_logs").select("log_date").eq("client_id", c.id);
      const sessionsThisWeek = (logs || []).filter(l => isoWeekKey(l.log_date) === week).length;

      const { data: checkins } = await sb.from("weekly_checkins").select("week_key,bodyweight,created_at").eq("client_id", c.id).order("created_at", { ascending: false }).limit(2);
      const latest = (checkins || [])[0];
      const previous = (checkins || [])[1];
      c.overview = {
        sessionsThisWeek, trainingDaysTotal,
        checkinSubmittedThisWeek: latest ? latest.week_key === week : false,
        weightDelta: (latest && previous && latest.bodyweight != null && previous.bodyweight != null)
          ? Math.round((latest.bodyweight - previous.bodyweight) * 10) / 10 : null,
      };
    }));
  }

  const newClientBtn = document.querySelector("[data-new-client]");
  if (newClientBtn) newClientBtn.onclick = async () => {
    const name = prompt("Prénom du nouveau client :");
    if (!name) return;
    const code = randomAccessCode();
    const { data: newClient, error } = await sb.from("clients").insert({ name, access_code: code }).select().single();
    if (error) { showToast("Erreur lors de la création."); return; }
    await sb.from("programs").insert({ client_id: newClient.id, program_json: DEFAULT_PROGRAM });
    state.coachClients.unshift({ id: newClient.id, name, access_code: code, program_json: DEFAULT_PROGRAM });
    render();
    alert(`Client créé !\n\nDonne-lui ce code d'accès :\n${code}`);
  };

  document.querySelectorAll("[data-edit-program]").forEach(b => b.onclick = () => {
    state.coachEditingClientId = state.coachEditingClientId === b.dataset.editProgram ? null : b.dataset.editProgram;
    state.coachEditingVideosId = null;
    state.coachViewingScheduleId = null;
    render();
  });

  const cancelProgram = document.querySelector("[data-cancel-program]");
  if (cancelProgram) cancelProgram.onclick = () => { state.coachEditingClientId = null; render(); };

  const saveProgram = document.querySelector("[data-save-program]");
  if (saveProgram) saveProgram.onclick = async () => {
    const clientId = saveProgram.dataset.saveProgram;
    const raw = document.getElementById("programJsonEditor").value;
    let parsed;
    try { parsed = JSON.parse(raw); } catch (e) { alert("JSON invalide : " + e.message); return; }
    const { error } = await sb.from("programs").update({ program_json: parsed, updated_at: new Date().toISOString() }).eq("client_id", clientId);
    if (error) { showToast("Erreur lors de l'enregistrement."); return; }
    const c = state.coachClients.find(c => c.id === clientId);
    if (c) c.program_json = parsed;
    state.coachEditingClientId = null;
    showToast("Programme mis à jour.");
    render();
  };

  document.querySelectorAll("[data-edit-videos]").forEach(b => b.onclick = () => {
    state.coachEditingVideosId = state.coachEditingVideosId === b.dataset.editVideos ? null : b.dataset.editVideos;
    state.coachEditingClientId = null;
    state.coachEditingNutritionId = null;
    state.coachViewingCheckinsId = null;
    state.coachViewingScheduleId = null;
    render();
  });

  const cancelVideos = document.querySelector("[data-cancel-videos]");
  if (cancelVideos) cancelVideos.onclick = () => { state.coachEditingVideosId = null; render(); };

  const saveVideos = document.querySelector("[data-save-videos]");
  if (saveVideos) saveVideos.onclick = async () => {
    const clientId = saveVideos.dataset.saveVideos;
    const c = state.coachClients.find(c => c.id === clientId);
    const program = JSON.parse(JSON.stringify(c.program_json || DEFAULT_PROGRAM));
    const videoMap = {};
    program.forEach(d => d.exercises.forEach(e => {
      const input = document.querySelector(`[data-video-input="${e.id}"]`);
      if (input) {
        const val = input.value.trim();
        e.video = val || null;
        videoMap[e.name.trim().toLowerCase()] = val || null;
      }
    }));
    saveVideos.textContent = "Enregistrement…";
    saveVideos.disabled = true;
    const { error } = await sb.from("programs").update({ program_json: program, updated_at: new Date().toISOString() }).eq("client_id", clientId);
    if (error) { showToast("Erreur lors de l'enregistrement."); saveVideos.disabled = false; saveVideos.textContent = "✓ Enregistrer les vidéos"; return; }
    c.program_json = program;

    const applyAll = document.getElementById("applyAllVideos").checked;
    if (applyAll) {
      await Promise.all(state.coachClients.filter(oc => oc.id !== clientId).map(async (oc) => {
        const p = JSON.parse(JSON.stringify(oc.program_json || DEFAULT_PROGRAM));
        let changed = false;
        p.forEach(d => d.exercises.forEach(e => {
          const key = e.name.trim().toLowerCase();
          if (videoMap[key]) { e.video = videoMap[key]; changed = true; }
        }));
        if (changed) {
          await sb.from("programs").update({ program_json: p, updated_at: new Date().toISOString() }).eq("client_id", oc.id);
          oc.program_json = p;
        }
      }));
    }

    showToast(applyAll ? "Vidéos enregistrées pour tous les clients concernés." : "Vidéos enregistrées.");
    state.coachEditingVideosId = null;
    render();
  };

  const logoutCoach = document.querySelector("[data-logout-coach]");
  if (logoutCoach) logoutCoach.onclick = () => { state.screen = "access"; state.coachAuthed = false; render(); };

  const docUploadBtn = document.getElementById("docUploadBtn");
  if (docUploadBtn) docUploadBtn.onclick = async () => {
    const title = document.getElementById("docTitleInput").value.trim();
    const category = document.getElementById("docCategoryInput").value.trim() || "Général";
    const clientId = document.getElementById("docClientSelect").value || null;
    const file = document.getElementById("docFileInput").files[0];
    if (!title || !file) { alert("Ajoute un titre et choisis un fichier PDF."); return; }
    docUploadBtn.textContent = "Envoi…";
    docUploadBtn.disabled = true;
    const path = `${Date.now()}-${file.name}`;
    const { error: uploadError } = await sb.storage.from("documents").upload(path, file);
    if (uploadError) { alert("Erreur d'upload : " + uploadError.message); docUploadBtn.textContent = "⬆ Envoyer le document"; docUploadBtn.disabled = false; return; }
    const { data: urlData } = sb.storage.from("documents").getPublicUrl(path);
    const { data: inserted, error: insertError } = await sb.from("documents").insert({
      title, category, client_id: clientId, file_url: urlData.publicUrl, file_path: path,
    }).select("*, clients(name)").single();
    if (insertError) { alert("Erreur : " + insertError.message); docUploadBtn.textContent = "⬆ Envoyer le document"; docUploadBtn.disabled = false; return; }
    state.coachDocuments = [inserted, ...(state.coachDocuments || [])];
    showToast("Document envoyé !");
    docUploadBtn.textContent = "⬆ Envoyer le document";
    docUploadBtn.disabled = false;
    document.getElementById("docTitleInput").value = "";
    document.getElementById("docCategoryInput").value = "";
    document.getElementById("docFileInput").value = "";
    render();
  };

  document.querySelectorAll("[data-delete-doc]").forEach(b => b.onclick = async () => {
    const docId = b.dataset.deleteDoc;
    const doc = (state.coachDocuments || []).find(d => d.id === docId);
    if (!doc) return;
    if (!confirm(`Supprimer définitivement "${doc.title}" ? Il ne sera plus visible par les clients concernés.`)) return;
    if (doc.file_path) await sb.storage.from("documents").remove([doc.file_path]);
    const { error } = await sb.from("documents").delete().eq("id", docId);
    if (error) { showToast("Erreur lors de la suppression."); return; }
    state.coachDocuments = state.coachDocuments.filter(d => d.id !== docId);
    showToast("Document supprimé.");
    render();
  });

  const seedRecipesBtn = document.querySelector("[data-seed-recipes]");
  if (seedRecipesBtn) seedRecipesBtn.onclick = async () => {
    seedRecipesBtn.textContent = "Ajout en cours…";
    seedRecipesBtn.disabled = true;
    const { data, error } = await sb.from("recipes").insert(STARTER_RECIPES).select();
    if (error) { showToast("Erreur : " + error.message); seedRecipesBtn.disabled = false; seedRecipesBtn.textContent = "✓ Ajouter les 16 recettes de démarrage"; return; }
    state.coachRecipes = [...state.coachRecipes, ...(data || [])];
    showToast("Recettes ajoutées !");
    render();
  };

  const createRecipeBtn = document.getElementById("createRecipeBtn");
  if (createRecipeBtn) createRecipeBtn.onclick = async () => {
    const title = document.getElementById("newRecipeTitle").value.trim();
    const category = document.getElementById("newRecipeCategory").value;
    const kcal = parseFloat(document.getElementById("newRecipeKcal").value);
    const protein = parseFloat(document.getElementById("newRecipeProtein").value) || 0;
    const carbs = parseFloat(document.getElementById("newRecipeCarbs").value) || 0;
    const fat = parseFloat(document.getElementById("newRecipeFat").value) || 0;
    const ingredients = document.getElementById("newRecipeIngredients").value.trim();
    const instructions = document.getElementById("newRecipeInstructions").value.trim();
    if (!title || isNaN(kcal)) { alert("Donne au moins un titre et des kcal."); return; }
    createRecipeBtn.textContent = "Création…";
    createRecipeBtn.disabled = true;
    const { data, error } = await sb.from("recipes").insert({
      title, category, kcal, protein, carbs, fat, ingredients, instructions,
    }).select().single();
    if (error) { showToast("Erreur : " + error.message); createRecipeBtn.disabled = false; createRecipeBtn.textContent = "✓ Créer la recette"; return; }
    state.coachRecipes.push(data);
    showToast("Recette créée !");
    document.getElementById("newRecipeTitle").value = "";
    document.getElementById("newRecipeIngredients").value = "";
    document.getElementById("newRecipeInstructions").value = "";
    document.getElementById("newRecipeKcal").value = "";
    document.getElementById("newRecipeProtein").value = "";
    document.getElementById("newRecipeCarbs").value = "";
    document.getElementById("newRecipeFat").value = "";
    render();
  };

  document.querySelectorAll("[data-delete-recipe]").forEach(b => b.onclick = async () => {
    const id = b.dataset.deleteRecipe;
    const r = state.coachRecipes.find(r => r.id === id);
    if (!r) return;
    if (!confirm(`Supprimer la recette "${r.title}" ?`)) return;
    const { error } = await sb.from("recipes").delete().eq("id", id);
    if (error) { showToast("Erreur lors de la suppression."); return; }
    state.coachRecipes = state.coachRecipes.filter(r => r.id !== id);
    showToast("Recette supprimée.");
    render();
  });

  document.querySelectorAll("[data-view-checkins]").forEach(b => b.onclick = async () => {
    const clientId = b.dataset.viewCheckins;
    if (state.coachViewingCheckinsId === clientId) {
      state.coachViewingCheckinsId = null;
      render();
      return;
    }
    const c = state.coachClients.find(c => c.id === clientId);
    const { data } = await sb.from("weekly_checkins").select("*").eq("client_id", clientId).order("created_at", { ascending: false });
    c.checkins = data || [];
    state.coachViewingCheckinsId = clientId;
    state.coachEditingClientId = null;
    state.coachEditingNutritionId = null;
    state.coachEditingVideosId = null;
    state.coachViewingScheduleId = null;
    render();
  });

  document.querySelectorAll("[data-view-schedule]").forEach(b => b.onclick = async () => {
    const clientId = b.dataset.viewSchedule;
    if (state.coachViewingScheduleId === clientId) {
      state.coachViewingScheduleId = null;
      render();
      return;
    }
    const c = state.coachClients.find(c => c.id === clientId);
    const now = new Date();
    const jsDay = (now.getDay() + 6) % 7;
    const monday = new Date(now);
    monday.setDate(now.getDate() - jsDay);
    const mondayStr = monday.toISOString().slice(0, 10);
    const { data } = await sb.from("session_logs").select("day_id, log_date").eq("client_id", clientId).gte("log_date", mondayStr);
    c.scheduleDone = [...new Set((data || []).map(l => l.day_id))];
    state.coachViewingScheduleId = clientId;
    state.coachEditingClientId = null;
    state.coachEditingNutritionId = null;
    state.coachEditingVideosId = null;
    state.coachViewingCheckinsId = null;
    render();
  });

  document.querySelectorAll("[data-edit-followup]").forEach(b => b.onclick = async () => {
    const clientId = b.dataset.editFollowup;
    if (state.coachEditingNutritionId === clientId) {
      state.coachEditingNutritionId = null;
      render();
      return;
    }
    const c = state.coachClients.find(c => c.id === clientId);
    const { data: n } = await sb.from("nutrition_targets").select("*").eq("client_id", clientId).maybeSingle();
    const { data: s } = await sb.from("steps_targets").select("*").eq("client_id", clientId).maybeSingle();
    const { data: m } = await sb.from("coach_messages").select("*").eq("client_id", clientId).maybeSingle();
    const { data: cd } = await sb.from("checkin_settings").select("*").eq("client_id", clientId).maybeSingle();
    c.nutrition = n || {};
    c.steps = s ? s.daily_steps : "";
    c.water = s ? s.water_liters : "";
    c.message = m ? m.message : "";
    c.checkinSettings = cd || { deadline_day: "Dimanche", deadline_time: "20:00" };
    state.coachEditingNutritionId = clientId;
    state.coachEditingClientId = null;
    state.coachViewingCheckinsId = null;
    state.coachEditingVideosId = null;
    state.coachViewingScheduleId = null;
    render();
  });

  const cancelFollowup = document.querySelector("[data-cancel-followup]");
  if (cancelFollowup) cancelFollowup.onclick = () => { state.coachEditingNutritionId = null; render(); };

  const saveFollowup = document.querySelector("[data-save-followup]");
  if (saveFollowup) saveFollowup.onclick = async () => {
    const clientId = saveFollowup.dataset.saveFollowup;
    const val = (id) => {
      const v = document.getElementById(id).value;
      return v === "" ? null : parseInt(v, 10);
    };
    const nutriPayload = {
      client_id: clientId,
      kcal_on: val("fKcalOn"), protein_on: val("fProtOn"), carbs_on: val("fCarbsOn"), fat_on: val("fFatOn"),
      kcal_off: val("fKcalOff"), protein_off: val("fProtOff"), carbs_off: val("fCarbsOff"), fat_off: val("fFatOff"),
      updated_at: new Date().toISOString(),
    };
    const stepsVal = val("fSteps");
    const waterValRaw = document.getElementById("fWater").value;
    const waterVal = waterValRaw === "" ? null : parseFloat(waterValRaw);
    const messageVal = document.getElementById("fMessage").value;
    const deadlineDay = document.getElementById("fDeadlineDay").value;
    const deadlineTime = document.getElementById("fDeadlineTime").value;

    await sb.from("nutrition_targets").upsert(nutriPayload);
    if (stepsVal !== null || waterVal !== null) {
      await sb.from("steps_targets").upsert({ client_id: clientId, daily_steps: stepsVal, water_liters: waterVal });
    }
    await sb.from("coach_messages").upsert({ client_id: clientId, message: messageVal, updated_at: new Date().toISOString() });
    await sb.from("checkin_settings").upsert({ client_id: clientId, deadline_day: deadlineDay, deadline_time: deadlineTime });

    showToast("Suivi mis à jour.");
    state.coachEditingNutritionId = null;
    render();
  };
}

/* ---------------- Accueil (dashboard) ---------------- */
function renderAccueil() {
  const nutriTotals = (state.foodLogsToday || []).reduce((acc, f) => {
    acc.kcal += Number(f.kcal) || 0;
    acc.protein += Number(f.protein) || 0;
    acc.carbs += Number(f.carbs) || 0;
    acc.fat += Number(f.fat) || 0;
    return acc;
  }, { kcal: 0, protein: 0, carbs: 0, fat: 0 });
  const t = state.nutritionTargets;
  const kcalTarget = t ? (state.nutritionDayType === "on" ? t.kcal_on : t.kcal_off) : null;
  const pct = kcalTarget ? Math.min(100, Math.round((nutriTotals.kcal / kcalTarget) * 100)) : null;

  const latestDoc = (state.documents || [])[0];

  let html = `
    <div class="h1">SALUT ${esc(state.client.name).toUpperCase()}</div>
    <div class="subtitle">${formatDateFR(todayISO())}</div>
  `;

  // --- Message du coach, tout en haut ---
  if (state.coachMessage) {
    html += `<div class="info-box">💬 <strong>Message de ton coach :</strong><br/>${esc(state.coachMessage)}</div>`;
  }

  // --- Rappel de bilan, si applicable ---
  if (!state.checkinSubmittedThisWeek) {
    const deadline = getDeadlineDate();
    if (deadline) {
      const diffMs = deadline - new Date();
      const isPast = diffMs < 0;
      const absHours = Math.abs(diffMs) / 3600000;
      let timeText;
      if (absHours < 1) timeText = `${Math.round(Math.abs(diffMs) / 60000)} min`;
      else if (absHours < 24) timeText = `${Math.round(absHours)}h`;
      else timeText = `${Math.round(absHours / 24)}j`;
      html += `<div class="info-box" style="${isPast ? "border-color:var(--danger);background:rgba(255,107,107,0.12);" : ""}">
        ⏰ ${isPast
          ? `Ton bilan hebdomadaire est en retard (attendu ${esc(state.checkinSettings.deadline_day)} à ${esc(state.checkinSettings.deadline_time)}) !`
          : `Bilan à envoyer avant ${esc(state.checkinSettings.deadline_day)} ${esc(state.checkinSettings.deadline_time)} — encore ${timeText}`}
        <button data-goto-checkin="1" style="display:block;margin-top:8px;background:none;border:none;padding:0;color:inherit;text-decoration:underline;font-weight:700;cursor:pointer;">Remplir maintenant →</button>
      </div>`;
    }
  }

  // --- Dernier document ajouté ---
  html += `<div class="section-label">Dernier document</div>`;
  if (latestDoc) {
    html += `<a href="${esc(latestDoc.file_url)}" target="_blank" rel="noopener" class="day-card" style="text-decoration:none;">
      <div class="day-left"><div class="day-num">📄</div>
        <div><div class="day-title">${esc(latestDoc.title)}</div><div class="day-sub">Ajouté le ${formatDateFR(latestDoc.created_at.slice(0, 10))}</div></div>
      </div>
      <span style="color:var(--textDim);">›</span>
    </a>`;
  } else {
    html += `<div style="font-size:13.5px;color:var(--textDim);margin-bottom:12px;">Ton coach n'a pas encore ajouté de document.</div>`;
  }

  // --- Objectifs du jour : pas, kcal, eau ---
  html += `<div class="section-label" style="margin-top:20px;">Objectifs du jour</div>`;
  html += `<div class="stat-row">
    <div class="stat-card">
      <div style="color:var(--accentDim);margin-bottom:8px;">👣</div>
      <div class="stat-value">${state.stepsTarget || "—"}</div>
      <div class="stat-label">Pas à faire</div>
    </div>
    <div class="stat-card">
      <div style="color:var(--accentDim);margin-bottom:8px;">💧</div>
      <div class="stat-value">${state.waterTarget || "2-3"}L</div>
      <div class="stat-label">Eau minimum</div>
    </div>
  </div>`;

  html += `<div class="stat-row">
    <div class="stat-card" style="flex:1;">
      <div style="color:var(--accentDim);margin-bottom:8px;">🍎</div>
      <div class="stat-value">${kcalTarget ? Math.round(nutriTotals.kcal) + "/" + kcalTarget : Math.round(nutriTotals.kcal)}</div>
      <div class="stat-label">kcal (jour ${state.nutritionDayType === "on" ? "ON" : "OFF"})</div>
    </div>
  </div>`;

  if (pct !== null) {
    html += `<div class="chart-card" style="margin-bottom:16px;">
      <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--textDim);margin-bottom:8px;">
        <span>Progression kcal du jour</span><span>${pct}%</span>
      </div>
      <div style="background:var(--border);border-radius:999px;height:10px;overflow:hidden;">
        <div style="background:var(--accent);height:100%;width:${pct}%;"></div>
      </div>
    </div>`;
  }

  html += `<button class="day-card" data-goto-tab="nutrition">
    <div class="day-left"><div class="day-num">🍽️</div>
      <div><div class="day-title">Nutrition du jour</div><div class="day-sub">Ajouter un aliment, voir mes macros</div></div>
    </div>
    <span style="color:var(--textDim);">›</span>
  </button>`;

  return html;
}

  let html = `
    <div class="h1">ENTRAÎNEMENT</div>
    <div class="subtitle">${esc(state.client.name)} — programme hebdomadaire</div>
    <div class="info-box">Choisis ta séance du jour selon ton programme.</div>
    <div class="section-label">Choisis ta séance du jour</div>
  `;
  state.program.forEach(day => {
    const doneDates = state.sessionLogs.filter(l => l.dayId === day.id).map(l => l.date);
    const doneThisWeek = doneDates.some(d => isoWeekKey(d) === week);
    if (day.isRest) {
      html += `
        <div class="day-card rest">
          <div class="day-left">
            <div class="day-num rest">${day.num}</div>
            <div><div class="day-title">${esc(day.day)} : Repos</div><div class="day-sub">Récupération</div></div>
          </div>
        </div>`;
    } else {
      html += `
        <button class="day-card" data-open-day="${day.id}">
          <div class="day-left">
            <div class="day-num">${day.num}</div>
            <div><div class="day-title">${esc(day.day)} : ${esc(day.name)}</div><div class="day-sub">${day.exercises.length} exercices</div></div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            ${doneThisWeek ? `<span style="color:var(--accentDim);font-size:12px;font-weight:700;">✓ fait</span>` : ""}
            <span style="color:var(--textDim);">›</span>
          </div>
        </button>`;
    }
  });
  return html;
}

/* ---------------- Exercise card ---------------- */
function renderExerciseCard(exo, day, opts) {
  opts = opts || {};
  const rows = parseTargetSets(exo.sets);
  const hist = getExerciseHistory(exo.id);
  const last = hist[hist.length - 1];
  const suggestion = buildSuggestion(last, rows);
  const isOpen = state.openEx[exo.id] !== false;
  const currentRows = state.sessionInputs[exo.id] || rows.map(r => ({ reps: r, kg: "" }));
  const doneCount = currentRows.filter(r => r.kg !== "" && r.kg !== undefined).length;

  let inner = "";
  if (isOpen) {
    inner += `<div class="row"><span style="color:var(--textDim);font-size:13px;">Cible</span>
      ${rows.map(r => `<span class="pill">${esc(r)}</span>`).join("")}
      <span style="color:var(--textDim);font-size:13px;margin-left:4px;">⏱ ${esc(exo.rest)}</span>
    </div>`;

    if (last) {
      inner += `<div style="margin-bottom:12px;">
        <div class="last-perf">📈 Semaine dernière · ${formatDateFR(last.date)}</div>
        <div class="row" style="margin-bottom:${suggestion ? "10px" : "0"};">
          ${last.sets.map(s => `<span class="chip-lastweek">${esc(s.reps)} × ${esc(s.kg)}kg</span>`).join("")}
        </div>
        ${suggestion ? `<div class="objective">🎯 ${esc(suggestion)}</div>` : ""}
      </div>`;
    } else {
      inner += `<div style="font-size:13px;color:var(--textDim);margin-bottom:12px;font-style:italic;">Première fois sur cet exercice — enregistre tes charges pour suivre ta progression.</div>`;
    }

    inner += `<div class="set-row" style="margin-bottom:4px;">
      <div style="font-size:12px;color:var(--textDim);">Série</div>
      <div style="font-size:12px;color:var(--textDim);">Reps</div>
      <div style="font-size:12px;color:var(--textDim);">kg</div>
    </div>`;
    currentRows.forEach((row, i) => {
      inner += `<div class="set-row">
        <div class="set-num">${i + 1}</div>
        <input data-set-field="reps" data-ex-id="${exo.id}" data-idx="${i}" value="${esc(row.reps)}" />
        <input data-set-field="kg" data-ex-id="${exo.id}" data-idx="${i}" value="${esc(row.kg)}" placeholder="kg" inputmode="decimal" />
      </div>`;
    });

    inner += `<input class="note-input" data-note-ex="${exo.id}" value="${esc(state.notes[exo.id] || "")}" placeholder="Ajouter ma note perso…" />`;
  }

  const cardClass = opts.superset ? "ex-card superset-member" : "ex-card";
  return `<div class="${cardClass}">
    <button class="ex-head" data-toggle-ex="${exo.id}">
      <div style="flex:1;padding-right:10px;">
        <div class="ex-name">${esc(exo.name)} ${exo.video ? `<a href="${esc(exo.video)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="text-decoration:none;">🎥</a>` : ""}</div>
        <span class="pill">${esc(exo.muscle)}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:12px;color:var(--textDim);font-family:var(--mono);">${doneCount}/${rows.length}</span>
        <span style="color:var(--textDim);">${isOpen ? "▾" : "▸"}</span>
      </div>
    </button>
    ${isOpen ? `<div class="ex-body">${inner}</div>` : ""}
  </div>`;
}

/* ---------------- Session ---------------- */
function renderSession(day) {
  const groups = groupExercises(day.exercises);
  let totalSets = 0, filledSets = 0;
  day.exercises.forEach(e => {
    const rows = parseTargetSets(e.sets);
    totalSets += rows.length;
    const cur = state.sessionInputs[e.id] || [];
    filledSets += cur.filter(r => r.kg !== "" && r.kg !== undefined).length;
  });

  let html = `
    <div style="margin:20px 0 4px;">
      <button class="back-btn" data-back="1">← Retour</button>
    </div>
    <div class="h1" style="font-size:26px;margin-top:10px;color:var(--accent);">${esc(day.day).toUpperCase()} : ${esc(day.name).toUpperCase()}</div>
    <div class="subtitle">${day.exercises.length} exercices · ${formatDateFR(todayISO())}</div>
  `;

  groups.forEach(group => {
    if (group.type === "single") {
      html += renderExerciseCard(group.items[0], day);
    } else {
      html += `<div class="superset-wrap"><div class="superset-label">🔥 Superset — enchaîne sans repos entre les deux</div>`;
      group.items.forEach((exo, idx) => {
        html += renderExerciseCard(exo, day, { superset: true });
        if (idx < group.items.length - 1) {
          html += `<div class="superset-connector"><div class="connector-dot">+</div></div>`;
        }
      });
      html += `</div>`;
    }
  });

  html += `<button class="validate-btn" data-validate="${day.id}" ${filledSets === 0 ? "disabled" : ""}>
    ✓ Valider la séance (${filledSets}/${totalSets} séries)
  </button>`;

  return html;
}

/* ---------------- Recap ---------------- */
function renderRecap(logId) {
  const log = state.sessionLogs.find(l => l.id === logId);
  if (!log) return renderHome();
  const day = state.program.find(d => d.id === log.dayId);
  let totalTonnage = 0, totalSets = 0;
  const rows = [];
  day.exercises.forEach(e => {
    const sets = log.entries[e.id];
    if (!sets || !sets.length) return;
    let exTonnage = 0;
    sets.forEach(s => {
      const reps = parseInt(s.reps, 10) || 0;
      const kg = parseFloat(s.kg) || 0;
      exTonnage += reps * kg;
      totalSets++;
    });
    totalTonnage += exTonnage;
    rows.push({ name: e.name, sets });
  });
  return `
    <div style="padding-top:24px;text-align:center;">
      <div style="font-size:40px;margin-bottom:8px;">🎉</div>
      <div class="h1" style="font-size:26px;">SÉANCE VALIDÉE</div>
      <div class="subtitle">${esc(day.day)} : ${esc(day.name)} · ${formatDateFR(log.date)}</div>
    </div>
    <div class="stat-row">
      <div class="stat-card"><div style="color:var(--accentDim);margin-bottom:8px;">🏋️</div><div class="stat-value">${Math.round(totalTonnage).toLocaleString("fr-FR")} kg</div><div class="stat-label">Tonnage total</div></div>
      <div class="stat-card"><div style="color:var(--accentDim);margin-bottom:8px;">✓</div><div class="stat-value">${totalSets}</div><div class="stat-label">Séries effectuées</div></div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:20px;">
      ${rows.map(r => `
        <div style="margin-bottom:14px;">
          <div style="font-weight:700;margin-bottom:6px;">${esc(r.name)}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            ${r.sets.map(s => `<span class="chip-lastweek">${esc(s.reps)} × ${esc(s.kg)}kg</span>`).join("")}
          </div>
        </div>`).join("")}
    </div>
    <div class="ex-card"><div class="ex-body" style="padding-top:16px;">
      <div style="font-weight:700;margin-bottom:10px;">Comment tu as vécu cette séance ?</div>
      <div style="font-size:13px;color:var(--textDim);margin-bottom:8px;">Ressenti (RPE) — 1 = très facile, 10 = à l'échec total</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;">
        ${Array.from({ length: 10 }, (_, i) => i + 1).map(n => `<button data-recap-rpe="${n}" style="flex:1 1 16%;padding:10px 0;border-radius:10px;border:1px solid var(--border);background:${state.recapRpe == n ? "var(--accent)" : "transparent"};color:${state.recapRpe == n ? "var(--accentText)" : "var(--textDim)"};font-weight:700;">${n}</button>`).join("")}
      </div>
      <textarea id="recapComment" placeholder="Un commentaire sur la séance ? (optionnel)" rows="3" style="margin-bottom:12px;">${esc(state.recapComment || "")}</textarea>
      <button class="validate-btn" style="margin-top:0;" data-save-rpe="${log.id}">✓ Enregistrer mon ressenti</button>
    </div></div>
    <button class="validate-btn" data-close-recap="1">Retour à l'accueil</button>
  `;
}

/* ---------------- Nutrition ---------------- */
async function loadAllFoodLogs() {
  const { data } = await sb.from("food_logs").select("*").eq("client_id", state.client.id).order("created_at", { ascending: false }).limit(500);
  state.allFoodLogs = data || [];
  render();
}

async function loadScannedProducts() {
  const { data } = await sb.from("scanned_products").select("*").order("created_at", { ascending: false }).limit(200);
  state.scannedProducts = data || [];
  render();
}

async function loadRecipes() {
  const { data } = await sb.from("recipes").select("*").order("category", { ascending: true }).order("title", { ascending: true });
  state.recipes = data || [];
  render();
}

function renderNutrition() {
  const t = state.nutritionTargets;
  const dayType = state.nutritionDayType || "on";
  const kcalTarget = t ? (dayType === "on" ? t.kcal_on : t.kcal_off) : null;
  const proteinTarget = t ? (dayType === "on" ? t.protein_on : t.protein_off) : null;
  const carbsTarget = t ? (dayType === "on" ? t.carbs_on : t.carbs_off) : null;
  const fatTarget = t ? (dayType === "on" ? t.fat_on : t.fat_off) : null;

  const totals = (state.foodLogsToday || []).reduce((acc, f) => {
    acc.kcal += Number(f.kcal) || 0;
    acc.protein += Number(f.protein) || 0;
    acc.carbs += Number(f.carbs) || 0;
    acc.fat += Number(f.fat) || 0;
    return acc;
  }, { kcal: 0, protein: 0, carbs: 0, fat: 0 });

  let html = `<div class="h1" style="font-size:26px;">NUTRITION</div>
    <div class="subtitle">${formatDateFR(todayISO())}</div>
    <div class="day-tabs">
      <button class="day-tab ${dayType === "on" ? "active" : ""}" data-set-daytype="on">Jour ON (entraînement)</button>
      <button class="day-tab ${dayType === "off" ? "active" : ""}" data-set-daytype="off">Jour OFF (repos)</button>
    </div>`;

  if (!t) {
    html += `<div class="empty-state">🍎<div>Ton coach n'a pas encore défini tes objectifs nutritionnels.</div></div>`;
  } else {
    html += `<div class="chart-card" style="margin-bottom:20px;">
      <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--textDim);margin-bottom:8px;">
        <span>Kcal</span><span>${Math.round(totals.kcal)} / ${kcalTarget || "—"}</span>
      </div>
      <div style="background:var(--border);border-radius:999px;height:10px;overflow:hidden;margin-bottom:16px;">
        <div style="background:var(--accent);height:100%;width:${kcalTarget ? Math.min(100, Math.round(totals.kcal / kcalTarget * 100)) : 0}%;"></div>
      </div>
      <div style="display:flex;justify-content:space-between;gap:8px;text-align:center;">
        <div style="flex:1;"><div style="font-weight:800;">${Math.round(totals.protein)}g / ${proteinTarget || "—"}g</div><div style="font-size:12px;color:var(--textDim);">Protéines</div></div>
        <div style="flex:1;"><div style="font-weight:800;">${Math.round(totals.carbs)}g / ${carbsTarget || "—"}g</div><div style="font-size:12px;color:var(--textDim);">Glucides</div></div>
        <div style="flex:1;"><div style="font-weight:800;">${Math.round(totals.fat)}g / ${fatTarget || "—"}g</div><div style="font-size:12px;color:var(--textDim);">Lipides</div></div>
      </div>
    </div>`;
  }

  html += `<div class="day-tabs">
    <button class="day-tab ${state.nutritionSubView === "recherche" ? "active" : ""}" data-nutrition-subview="recherche">🔍 Rechercher</button>
    <button class="day-tab ${state.nutritionSubView === "recent" ? "active" : ""}" data-nutrition-subview="recent">🕐 Récemment</button>
    <button class="day-tab ${state.nutritionSubView === "frequent" ? "active" : ""}" data-nutrition-subview="frequent">🔥 Plus mangé</button>
    <button class="day-tab ${state.nutritionSubView === "scanned" ? "active" : ""}" data-nutrition-subview="scanned">📷 Scanné</button>
    <button class="day-tab ${state.nutritionSubView === "recipes" ? "active" : ""}" data-nutrition-subview="recipes">📖 Recettes</button>
  </div>`;

  if (state.nutritionSubView === "recent" || state.nutritionSubView === "frequent") {
    if (state.allFoodLogs === null) {
      html += `<div class="empty-state">Chargement…</div>`;
      return html;
    }
    let list;
    if (state.nutritionSubView === "recent") {
      const seen = new Set();
      list = [];
      [...state.allFoodLogs].sort((a, b) => b.created_at.localeCompare(a.created_at)).forEach(f => {
        if (seen.has(f.food_name)) return;
        seen.add(f.food_name);
        list.push(f);
      });
      list = list.slice(0, 20);
    } else {
      const counts = {};
      state.allFoodLogs.forEach(f => {
        if (!counts[f.food_name]) counts[f.food_name] = { entry: f, count: 0 };
        counts[f.food_name].count++;
        if (f.created_at > counts[f.food_name].entry.created_at) counts[f.food_name].entry = f;
      });
      list = Object.values(counts).sort((a, b) => b.count - a.count).slice(0, 20).map(c => c.entry);
    }
    if (list.length === 0) {
      html += `<div class="empty-state">🍽️<div>Pas encore d'historique alimentaire.</div></div>`;
    } else {
      html += `<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;">`;
      list.forEach(f => {
        const ratio = 100 / (Number(f.grams) || 100);
        html += `<button class="day-card" data-reuse-food="${esc(f.food_name)}|${Math.round(f.kcal * ratio)}|${Math.round(f.protein * ratio)}|${Math.round(f.carbs * ratio)}|${Math.round(f.fat * ratio)}|${f.grams}">
          <div class="day-left"><div>
            <div class="day-title">${esc(f.food_name)}</div>
            <div class="day-sub">Dernière fois : ${f.grams}g · ${Math.round(f.kcal)} kcal</div>
          </div></div>
          <span style="color:var(--textDim);">›</span>
        </button>`;
      });
      html += `</div>`;
    }
  } else if (state.nutritionSubView === "scanned") {
    if (state.scannedProducts === null) {
      html += `<div class="empty-state">Chargement…</div>`;
      return html;
    }
    if (state.scannedProducts.length === 0) {
      html += `<div class="empty-state">📷<div>Aucun produit scanné pour l'instant.</div><div style="font-size:13px;">Scanne un code-barres pour l'ajouter ici, il sera instantané la prochaine fois — même pour un autre client.</div></div>`;
    } else {
      html += `<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;">`;
      state.scannedProducts.forEach(p => {
        html += `<button class="day-card" data-select-scanned="${esc(p.barcode)}">
          <div class="day-left"><div>
            <div class="day-title">${esc(p.name)}</div>
            <div class="day-sub">${p.kcal_per_100} kcal / 100g</div>
          </div></div>
          <span style="color:var(--textDim);">›</span>
        </button>`;
      });
      html += `</div>`;
    }
  } else if (state.nutritionSubView === "recipes") {
    if (state.recipes === null) {
      html += `<div class="empty-state">Chargement…</div>`;
      return html;
    }
    if (state.recipeOpenId) {
      const r = state.recipes.find(r => r.id === state.recipeOpenId);
      if (!r) { state.recipeOpenId = null; }
      else {
        html += `<button class="back-btn" data-back-recipe="1" style="margin-bottom:12px;">← Retour aux recettes</button>`;
        html += `<div class="ex-card"><div class="ex-body" style="padding-top:16px;">
          <div class="ex-name">${esc(r.title)}</div>
          <span class="pill" style="margin-bottom:12px;display:inline-flex;">${esc(r.category)}</span>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin:12px 0;">
            <span class="chip-lastweek">${r.kcal} kcal</span>
            <span class="chip-lastweek">${r.protein}g prot</span>
            <span class="chip-lastweek">${r.carbs}g gluc</span>
            <span class="chip-lastweek">${r.fat}g lip</span>
          </div>
          <div style="font-weight:700;margin-bottom:6px;font-size:13.5px;">Ingrédients</div>
          <div style="color:var(--textDim);font-size:13.5px;margin-bottom:14px;line-height:1.6;">${esc(r.ingredients || "")}</div>
          <div style="font-weight:700;margin-bottom:6px;font-size:13.5px;">Préparation</div>
          <div style="color:var(--textDim);font-size:13.5px;margin-bottom:16px;line-height:1.6;">${esc(r.instructions || "")}</div>
          <button class="validate-btn" style="margin-top:0;" data-log-recipe="${r.id}">✓ Ajouter à mon repas</button>
        </div></div>`;
      }
    } else {
      const cats = ["Entrée", "Plat", "Dessert"];
      cats.forEach(cat => {
        const items = state.recipes.filter(r => r.category === cat);
        if (items.length === 0) return;
        html += `<div class="section-label">${cat}s</div>`;
        items.forEach(r => {
          html += `<button class="day-card" data-open-recipe="${r.id}">
            <div class="day-left"><div>
              <div class="day-title">${esc(r.title)}</div>
              <div class="day-sub">${r.kcal} kcal · ${r.protein}g prot / ${r.carbs}g gluc / ${r.fat}g lip</div>
            </div></div>
            <span style="color:var(--textDim);">›</span>

        });

      if (state.recipes.length === 0) {
        html += `<div class="empty-state">📖<div>Ton coach n'a pas encore ajouté de recette.</div></div>`;
      }
    }
  } else {

      <div style="font-weight:700;margin-bottom:10px;">🔍 Ajouter un aliment</div>

      <button data-open-scanner="1" style="width:100%;background:none;border:1px solid var(--accent);color:var(--accent);border-radius:10px;padding:10px;font-size:13px;font-weight:700;margin-bottom:8px;">📷 Scanner un code-barres</button>
      <button data-toggle-create-food="1" style="width:100%;border:1px dashed var(--border);background:none;color:var(--textDim);border-radius:10px;padding:10px;font-size:13px;">+ Créer mon propre aliment</button>
    </div></div>`;

    if (state.showCreateFood) {
      html += `<div class="ex-card"><div class="ex-body" style="padding-top:16px;">

            <div class="day-sub">${food.kcalPer100} kcal / 100g${food.brand ? " · " + esc(food.brand) : ""}</div>
          </div></div>
          <span style="color:var(--textDim);">›</span>
        </button>`;

      html += `</div>`;

    html += `<div class="ex-card"><div class="ex-body" style="padding-top:16px;">
      <div class="ex-name">${esc(f.name)}</div>
      <div style="font-size:13px;color:var(--textDim);margin-bottom:12px;">${f.kcalPer100} kcal · ${f.proteinPer100}g prot · ${f.carbsPer100}g gluc · ${f.fatPer100}g lip — pour 100g</div>
      <div class="row">
        <span style="color:var(--textDim);font-size:13px;">Poids pesé</span>
        <input id="foodGramsInput" inputmode="decimal" placeholder="grammes" value="${f.defaultGrams || ""}" style="width:100px;" />
        <span style="color:var(--textDim);font-size:13px;">g</span>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="validate-btn" id="addFoodBtn" style="margin-top:0;flex:1;">✓ Ajouter</button>
        <button data-cancel-food="1" style="border:1px solid var(--border);background:none;color:var(--textDim);border-radius:14px;padding:0 16px;">Annuler</button>
      </div>
    </div></div>`;
  }

  if ((state.foodLogsToday || []).length > 0) {
    html += `<div class="section-label" style="margin-top:20px;">Aujourd'hui</div>`;
    state.foodLogsToday.forEach(f => {

async function loadDocuments() {
  const { data, error } = await sb.from("documents")
    .select("*")
    .or(`client_id.is.null,client_id.eq.${state.client.id}`)
    .order("created_at", { ascending: false });
  state.documents = error ? [] : (data || []);
  render();
}

function renderDocuments() {
  if (state.documents === null) {
    return `<div class="h1" style="font-size:26px;">DOCUMENTS</div><div class="empty-state">Chargement…</div>`;
  }
  if (state.documents.length === 0) {
    return `<div class="h1" style="font-size:26px;">DOCUMENTS</div><div class="empty-state">📄<div>Aucun document pour l'instant.</div></div>`;
  }

  const groups = {};
  state.documents.forEach(doc => {
    const cat = doc.category || "Général";
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(doc);
  });

  if (state.documentsOpenCategory && groups[state.documentsOpenCategory]) {
    const cat = state.documentsOpenCategory;
    let html = `
      <div style="margin:20px 0 4px;">
        <button class="back-btn" data-back-documents-category="1">← Retour</button>
      </div>
      <div class="h1" style="font-size:26px;margin-top:10px;">${esc(cat).toUpperCase()}</div>
      <div class="subtitle">${groups[cat].length} document${groups[cat].length > 1 ? "s" : ""}</div>`;
    groups[cat].forEach(doc => {
      html += `<a href="${esc(doc.file_url)}" target="_blank" rel="noopener" class="day-card" style="text-decoration:none;">
        <div class="day-left">
          <div class="day-num">📄</div>
          <div><div class="day-title">${esc(doc.title)}</div><div class="day-sub">${formatDateFR(doc.created_at.slice(0, 10))} · ouvrir le PDF</div></div>
        </div>
        <span style="color:var(--textDim);">›</span>
      </a>`;
    });
    return html;
  }

  let html = `
    <div class="h1" style="font-size:26px;">DOCUMENTS</div>
    <div class="subtitle">Choisis une catégorie</div>`;
  Object.keys(groups).sort().forEach(cat => {
    html += `<button class="day-card" data-open-doc-category="${esc(cat)}">
      <div class="day-left">
        <div class="day-num">📁</div>
        <div><div class="day-title">${esc(cat)}</div><div class="day-sub">${groups[cat].length} document${groups[cat].length > 1 ? "s" : ""}</div></div>
      </div>
      <span style="color:var(--textDim);">›</span>
    </button>`;
  });
  return html;
}


function renderHistorique() {
  const logs = [...state.sessionLogs].sort((a, b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id));
  let html = `
    <div style="margin:20px 0 4px;">
      <button class="back-btn" data-back-to-profil="1">← Retour</button>
    </div>
    <div class="h1" style="font-size:26px;margin-top:10px;">HISTORIQUE</div>
    <div class="subtitle">Toutes tes séances validées — appuie pour consulter ou corriger</div>`;
  if (logs.length === 0) {
    html += `<div class="empty-state">📜<div>Aucune séance validée pour l'instant.</div></div>`;
    return html;
  }
  logs.forEach(log => {
    const day = state.program.find(d => d.id === log.dayId);
    if (!day) return;
    let tonnage = 0, sets = 0;
    Object.values(log.entries).forEach(arr => arr.forEach(s => {
      tonnage += (parseInt(s.reps, 10) || 0) * (parseFloat(s.kg) || 0);
      sets++;
    }));
    html += `<button class="day-card" data-open-log="${log.id}">
      <div class="day-left">
        <div class="day-num">${day.num}</div>
        <div><div class="day-title">${esc(day.day)} : ${esc(day.name)}</div><div class="day-sub">${formatDateFR(log.date)} · ${Math.round(tonnage).toLocaleString("fr-FR")}kg · ${sets} séries${log.rpe ? ` · RPE ${log.rpe}/10` : ""}</div></div>
      </div>
      <span style="color:var(--textDim);">›</span>
    </button>`;
  });
  return html;
}

function renderHistoriqueDetail(logId) {
  const log = state.sessionLogs.find(l => l.id === logId);
  if (!log) return renderHistorique();
  if (!state.historyDraft) state.historyDraft = JSON.parse(JSON.stringify(log.entries));
  const draft = state.historyDraft;
  const day = state.program.find(d => d.id === log.dayId);
  let html = `
    <div style="margin:20px 0 4px;">
      <button class="back-btn" data-back-history="1">← Retour</button>
    </div>
    <div class="h1" style="font-size:26px;margin-top:10px;color:var(--accent);">${esc(day.day).toUpperCase()} : ${esc(day.name).toUpperCase()}</div>
    <div class="subtitle">${formatDateFR(log.date)} — corrige si besoin</div>
  `;
  day.exercises.forEach(e => {
    const sets = draft[e.id];
    if (!sets || !sets.length) return;
    html += `<div class="ex-card">
      <div class="ex-body" style="padding-top:16px;">
        <div class="ex-name">${esc(e.name)}</div>
        <span class="pill">${esc(e.muscle)}</span>
        <div class="set-row" style="margin-top:14px;margin-bottom:4px;">
          <div style="font-size:12px;color:var(--textDim);">Série</div>
          <div style="font-size:12px;color:var(--textDim);">Reps</div>
          <div style="font-size:12px;color:var(--textDim);">kg</div>
        </div>
        ${sets.map((s, i) => `
          <div class="set-row">
            <div class="set-num">${i + 1}</div>
            <input data-hist-field="reps" data-log-id="${log.id}" data-ex-id="${e.id}" data-idx="${i}" value="${esc(s.reps)}" />
            <input data-hist-field="kg" data-log-id="${log.id}" data-ex-id="${e.id}" data-idx="${i}" value="${esc(s.kg)}" inputmode="decimal" />
          </div>`).join("")}
      </div>
    </div>`;
  });
  html += `<button class="validate-btn" data-save-history="${log.id}">✓ Enregistrer les modifications</button>`;

  html += `<button data-delete-log="${log.id}" class="danger-btn" style="margin-top:22px;width:100%;">🗑 Supprimer cette séance de l'historique</button>`;
  return html;
}

/* ---------------- Progress ---------------- */
function suiviToggle() {
  return `<div class="day-tabs" style="margin-bottom:16px;">
    <button class="day-tab ${state.suiviView !== "corps" && state.suiviView !== "tonnage" ? "active" : ""}" data-suivi-view="exercices">Exercices</button>
    <button class="day-tab ${state.suiviView === "tonnage" ? "active" : ""}" data-suivi-view="tonnage">Tonnage</button>
    <button class="day-tab ${state.suiviView === "corps" ? "active" : ""}" data-suivi-view="corps">Poids & Photos</button>
  </div>`;
}

function logTonnage(log) {
  let t = 0;
  Object.values(log.entries).forEach(sets => sets.forEach(s => {
    t += (parseInt(s.reps, 10) || 0) * (parseFloat(s.kg) || 0);
  }));
  return t;
}

function renderTonnageProgress() {
  let html = `<div class="h1" style="font-size:26px;">PROGRESSION</div>` + suiviToggle();

  if (state.sessionLogs.length === 0) {
    html += `<div class="empty-state">🏋️<div>Valide des séances pour voir ton tonnage total évoluer ici.</div></div>`;
    return html;
  }

  const weekly = {};
  state.sessionLogs.forEach(log => {
    const wk = isoWeekKey(log.date);
    weekly[wk] = (weekly[wk] || 0) + logTonnage(log);
  });
  const weeks = Object.keys(weekly).sort();

  const w = 300, h = 160, padX = 24, padY = 16;
  const maxT = Math.max(...weeks.map(wk => weekly[wk]), 1);
  const stepX = weeks.length > 1 ? (w - padX * 2) / (weeks.length - 1) : 0;
  const coords = weeks.map((wk, i) => {
    const x = padX + stepX * i;
    const y = h - padY - (weekly[wk] / maxT) * (h - padY * 2);
    return { x, y, wk, t: weekly[wk] };
  });
  const path = coords.map((c, i) => `${i === 0 ? "M" : "L"}${c.x},${c.y}`).join(" ");
  const totalAllTime = weeks.reduce((s, wk) => s + weekly[wk], 0);

  html += `<div class="stat-row">
    <div class="stat-card"><div style="color:var(--accentDim);margin-bottom:8px;">🏋️</div><div class="stat-value">${Math.round(totalAllTime).toLocaleString("fr-FR")} kg</div><div class="stat-label">Tonnage cumulé total</div></div>
    <div class="stat-card"><div style="color:var(--accentDim);margin-bottom:8px;">📅</div><div class="stat-value">${Math.round(weekly[weeks[weeks.length - 1]]).toLocaleString("fr-FR")} kg</div><div class="stat-label">Cette semaine</div></div>
  </div>`;

  html += `<div class="chart-card">
    <div style="font-size:13px;color:var(--textDim);margin-bottom:10px;">Tonnage total soulevé, par semaine (toutes séances confondues)</div>
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:180px;">
      <path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2.5" />
      ${coords.map(c => `<circle cx="${c.x}" cy="${c.y}" r="4" fill="var(--accent)"><title>Semaine ${c.wk} — ${Math.round(c.t).toLocaleString("fr-FR")}kg</title></circle>`).join("")}
    </svg>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--textDim);margin-top:4px;">
      <span>${weeks[0]}</span>
      <span>${weeks[weeks.length - 1]}</span>
    </div>
  </div>`;

  return html;
}

async function loadCheckinsHistory() {
  const { data } = await sb.from("weekly_checkins").select("*").eq("client_id", state.client.id).order("created_at", { ascending: true });
  state.checkinsHistory = data || [];
  render();
}

function renderBodyProgress() {
  let html = `<div class="h1" style="font-size:26px;">PROGRESSION</div>` + suiviToggle();

  const checkins = state.checkinsHistory;
  if (checkins === null) {
    html += `<div class="empty-state">Chargement…</div>`;
    return html;
  }
  const withWeight = checkins.filter(c => c.bodyweight != null);
  if (withWeight.length === 0) {
    html += `<div class="empty-state">⚖️<div>Pas encore de bilan avec un poids renseigné.</div></div>`;
  } else {
    const w = 300, h = 160, padX = 24, padY = 16;
    const maxKg = Math.max(...withWeight.map(c => c.bodyweight));
    const minKg = Math.min(...withWeight.map(c => c.bodyweight));
    const range = (maxKg - minKg) || 1;
    const stepX = withWeight.length > 1 ? (w - padX * 2) / (withWeight.length - 1) : 0;
    const coords = withWeight.map((c, i) => {
      const x = padX + stepX * i;
      const y = h - padY - ((c.bodyweight - minKg) / range) * (h - padY * 2);
      return { x, y, date: c.created_at.slice(0, 10), kg: c.bodyweight };
    });
    const path = coords.map((c, i) => `${i === 0 ? "M" : "L"}${c.x},${c.y}`).join(" ");
    html += `<div class="chart-card" style="margin-bottom:20px;">
      <div style="font-size:13px;color:var(--textDim);margin-bottom:10px;">Poids (kg) — à jeun, semaine après semaine</div>
      <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:180px;">
        <path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2.5" />
        ${coords.map(c => `<circle cx="${c.x}" cy="${c.y}" r="4" fill="var(--accent)"><title>${formatDateFR(c.date)} — ${c.kg}kg</title></circle>`).join("")}
      </svg>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--textDim);margin-top:4px;">
        <span>${formatDateFR(coords[0].date)}</span>
        <span>${formatDateFR(coords[coords.length - 1].date)}</span>
      </div>
    </div>`;
  }

  const withPhotos = [...checkins].reverse().filter(c => c.photo_front_url || c.photo_back_url || c.photo_side_url);
  if (withPhotos.length === 0) {
    html += `<div class="empty-state">📸<div>Pas encore de photo de bilan.</div></div>`;
  } else {
    html += `<div class="section-label">Photos, du plus récent au plus ancien</div>`;
    withPhotos.forEach(c => {
      html += `<div style="margin-bottom:16px;">
        <div style="font-size:13px;color:var(--textDim);margin-bottom:8px;">${formatDateFR(c.created_at.slice(0, 10))}${c.bodyweight != null ? ` · ${c.bodyweight}kg` : ""}</div>
        <div style="display:flex;gap:8px;">
          ${["photo_front_url", "photo_back_url", "photo_side_url"].map(k => c[k]
            ? `<a href="${esc(c[k])}" target="_blank" rel="noopener"><img src="${esc(c[k])}" style="width:31%;aspect-ratio:3/4;object-fit:cover;border-radius:10px;border:1px solid var(--border);" /></a>`
            : `<div style="width:31%;aspect-ratio:3/4;border-radius:10px;border:1px dashed var(--border);"></div>`).join("")}
        </div>
      </div>`;
    });
  }
  return html;
}

function renderProgress() {
  const trainingDays = state.program.filter(d => !d.isRest);
  if (!state.progressDayId) state.progressDayId = trainingDays[0]?.id;
  const day = state.program.find(d => d.id === state.progressDayId);
  if (!state.progressExId || !day.exercises.find(e => e.id === state.progressExId)) {
    state.progressExId = day.exercises[0]?.id;
  }
  const exo = day.exercises.find(e => e.id === state.progressExId);
  const hist = exo ? getExerciseHistory(exo.id) : [];

  let html = `<div class="h1" style="font-size:26px;">PROGRESSION</div>` + suiviToggle() + `
    <div class="day-tabs">
      ${trainingDays.map(d => `<button class="day-tab ${d.id === state.progressDayId ? "active" : ""}" data-progress-day="${d.id}">${esc(d.name)}</button>`).join("")}
    </div>
    <select data-progress-ex style="margin-bottom:20px;">
      ${day.exercises.map(e => `<option value="${e.id}" ${e.id === state.progressExId ? "selected" : ""}>${esc(e.name)}</option>`).join("")}
    </select>`;

  if (hist.length === 0) {
    html += `<div class="empty-state">🏋️<div>Pas encore de données pour cet exercice.</div>
      <div style="font-size:13px;">Valide une séance pour voir ta progression ici.</div></div>`;
  } else {
    const points = hist.map(entry => {
      const best = entry.sets.reduce((max, s) => {
        const kg = parseFloat(s.kg) || 0;
        return kg > max.kg ? { kg, reps: s.reps } : max;
      }, { kg: 0, reps: "" });
      return { date: entry.date, kg: best.kg, reps: best.reps };
    });
    const maxKg = Math.max(...points.map(p => p.kg), 1);
    const w = 300, h = 160, padX = 24, padY = 16;
    const stepX = points.length > 1 ? (w - padX * 2) / (points.length - 1) : 0;
    const coords = points.map((p, i) => {
      const x = padX + stepX * i;
      const y = h - padY - (p.kg / maxKg) * (h - padY * 2);
      return { x, y, ...p };
    });
    const path = coords.map((c, i) => `${i === 0 ? "M" : "L"}${c.x},${c.y}`).join(" ");
    html += `<div class="chart-card">
      <div style="font-size:13px;color:var(--textDim);margin-bottom:10px;">Charge max par séance (kg)</div>
      <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:180px;">
        <path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2.5" />
        ${coords.map(c => `<circle cx="${c.x}" cy="${c.y}" r="4" fill="var(--accent)"><title>${formatDateFR(c.date)} — ${c.kg}kg × ${esc(c.reps)}</title></circle>`).join("")}
      </svg>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--textDim);margin-top:4px;">
        <span>${formatDateFR(points[0].date)}</span>
        <span>${formatDateFR(points[points.length - 1].date)}</span>
      </div>
    </div>`;
  }
  return html;
}
